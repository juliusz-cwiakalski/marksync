decisions:
  # Phase 0 classifications (pending Gate 0 confirmation via PR merge)
  - { phase: 0, text: "Inception flow = new (greenfield; no product source committed).", rationale: "Repo holds only .ai/, doc/, .gitignore, LICENSE across 3 trivial commits; the rich inception docs are research/spec inputs for an unbuilt product, not a legacy codebase.", date: 2026-07-03 }
  - { phase: 0, text: "Repo profile = engineering-repo.", rationale: "MarkSync is a software product (TS CLI/library). Strategy/business docs are inception inputs, not a standing business-documentation tree; documentation-profile defaults to engineering-repo when absent.", date: 2026-07-03 }
  - { phase: 0, text: "Project characteristics: code_project=true, complex_domain=true, ui_bearing=false, multi_user=true.", rationale: "TS product (code); rich domain (Storage/ADF, content properties, drift, ownership, atomicity); CLI tool (no GUI); multiple distinct user types (dev, tech writer, maintainer). Activates ubiquitous language + testing/CI/conventions + personas/JTBD; skips screen-inventory/UX-guidance.", date: 2026-07-03 }
  - { phase: 1, text: "Defer the Project PRD (Working Backwards press release) — optional per the inception guide.", rationale: "North star + personas/JTBD + OST already capture Phase 1 intent; PRD can be added later if the human wants it. Keeps Phase 1 reviewable.", date: 2026-07-03 }
  - { phase: 3, text: "Tech stack = TypeScript + Bun single-binary; remark/HAST Markdown pipeline; official Mermaid in-process; Storage Format write target; no DB/telemetry.", rationale: "ADR-0001 (TS over Go for Mermaid) + ADR-0005 (Storage over ADF) + spike MS-0001 evidence. Ports-and-adapters per spec §11 re-pointed to TS.", date: 2026-07-04 }
  - { phase: 3, text: "State model = source-side immutable UUID v7 + committed versioned lock + disposable .marksync/ cache (single CI-cacheable dir) + remote content-property cross-check + decentralized CI concurrency (Confluence 409 + operation-ID dedup, no shared service) + squash provenance via version.message + branch restriction (allowBranches).", rationale: "ADR-0006 (Proposed, refined via OPEN-Q5). Separates identity/base/cache per premortem §5.1; closes silent-overwrite/concurrency vectors (R-VAL-4, R-FEA-7). UUID v7 chosen over v4/KSUID (sortability + TS-lib strength). Must-materialize-in-Phase-3 per backlog-reconciliation.", date: 2026-07-04 }
  - { phase: 3, text: "CLI framework = Cliffy stable 1.x (@cliffy/command + @cliffy/prompt + @cliffy/flags).", rationale: "TDR-0002 (Proposed). Most feature-complete (prompts+completions); Bun-compatible. Pin post compile-smoke test. Maintenance risk bounded by presentation-adapter boundary.", date: 2026-07-04 }
  - { phase: 3, text: "Git adapter = shell-Git behind the Repository interface.", rationale: "TDR-0003 (Proposed). 100% feature coverage; git already a prereq for target users; zero bundle/compat risk. isomorphic-git is the swap option if zero-external-binary becomes hard.", date: 2026-07-04 }
  - { phase: 3, text: "Testing runner = bun:test + thin E2E runner; bun:test + happy-dom for Mermaid-DOM; vitest only as last-resort fallback.", rationale: "TDR-0004 (Proposed). Native, fastest, zero-dep, snapshots+mocks+Bun.serve mock server. Affects Phase 4 CI baseline.", date: 2026-07-04 }
  - { phase: 3, text: "Confluence page history provenance = squash by default for MS-0002; commit-by-commit deferred to a future milestone.", rationale: "ADR-0010 (Proposed, revised 2026-07-05). MarkSync-applied Confluence page versions carry a clear MarkSync/Git prefix, head commit id, and compact included-commit summary in version.message; exact version-message/history-description length limit must be verified before implementation. Rationale: simplicity, rate-limit safety, scope discipline, reduced privacy exposure.", date: 2026-07-04 }
  - { phase: 3, text: "Migrated ADR-0001..0005 from doc/inception/decisions/ to canonical doc/decisions/; introduced doc/inception/open-questions/ per-phase file pattern.", rationale: "OPEN-Q1 answer (migrate to meet ADOS structure) + open-questions-as-in-git-files retrospective (durable, grepable, inline-answerable).", date: 2026-07-04 }
  - { phase: 4, text: "Linter/formatter = Biome (lint + format in one tool).", rationale: "TDR-0005. Rust-fast, zero-config, Bun-compatible. ESLint+Prettier is fallback only if a needed rule is missing.", date: 2026-07-05 }
  - { phase: 4, text: "Import-boundary enforcement = dependency-cruiser.", rationale: "TDR-0006. Purpose-built architecture-rule enforcement; graph-based (no false negatives); clear AI-agent feedback on violations.", date: 2026-07-05 }
  - { phase: 4, text: "Gherkin/BDD runner = @cucumber/cucumber for lifecycle invariants.", rationale: "TDR-0007. Battle-tested, standard, active. Tests not compiled into binary so dependency cost is zero.", date: 2026-07-05 }
  - { phase: 4, text: "Conventional Commits enforcement = commitlint + husky commit-msg hook + CI.", rationale: "TDR-0008. Defense-in-depth: local hook for fast feedback + CI as authoritative gate. AI agents get clear format-violation feedback.", date: 2026-07-05 }
  - { phase: 4, text: "Accessibility baseline = CLI-focused (JSON/NDJSON output is primary accessible path; color auto-disabled non-interactive; provenance panel contract). Not a hard compliance requirement.", rationale: "OPEN-Q4 answer. In this project context, accessibility = easy to use via CLI + AI/CI. doc/guides/accessibility-baseline.md created.", date: 2026-07-05 }
  - { phase: 4, text: "Performance testing = minimal mock-based scenarios; deferred wiring to MS-0003+.", rationale: "OPEN-Q5 answer. Product NFRs are 'desired, not hard'; track regressions via commit-tracked baseline without blocking.", date: 2026-07-05 }
  - { phase: 4, text: "Confluence version.message length limit is undocumented per @external-researcher; live API spike needed at MS-0002 start.", rationale: "OPEN-Q6 answer. Atlassian v2 API docs do not specify maxLength for version.message; SPIKE-N prerequisite added to MS-0002 backlog.", date: 2026-07-05 }
  - { phase: 4, text: "CI baseline uses `continue-on-error` / `|| true` guards during inception so CI stays green with no source/tests; guards removed at MS-0002 start.", rationale: "No package.json/tsconfig/tests exist during inception. The CI scaffold establishes the target workflow shape and removes ambiguity about what CI will do.", date: 2026-07-05 }
  - { phase: 4, text: "Security baseline in doc/guides/security-baseline.md (not .ai/rules/) for visibility to non-agent readers.", rationale: "Security is a cross-cutting concern that human contributors, auditors, and stakeholders need to find easily. doc/guides/ is the canonical location for project guides; .ai/rules/ is for agent-loaded coding rules.", date: 2026-07-05 }
  - { phase: 5, text: "doc/00-index.md customized for MarkSync (replaced ADOS-generic tools/guides entries with project-specific overview/spec/decisions/baselines links).", rationale: "The ADOS-installed 00-index referenced tools (zclaude, text-to-image) and sections not present in this repo. Phase 5 activity 6 requires verifying 00-index links match actual docs.", date: 2026-07-06 }
  - { phase: 5, text: "PM instructions configured for GitHub Issues with lean project-specific content (no lifecycle prose duplication).", rationale: "pm_instructions_guidance: reference change-lifecycle.md, not repeat it. Tracker=GutHub Issues, squash-merge, Conventional Commits (TDR-0008), milestone tags (MS-*).", date: 2026-07-06 }

assumptions:
  # risk_type: value | usability | feasibility | viability
  # validation_status: unvalidated | testing | validated | invalidated
  - { text: "No product source code exists yet (greenfield start).", risk_type: feasibility, validation_status: validated, date: 2026-07-03 }
  - { text: "MarkSync is a CLI tool with no graphical UI.", risk_type: usability, validation_status: unvalidated, date: 2026-07-03 }
  - { text: "MarkSync serves multiple distinct user types (personas) even though each sync run is single-operator (one author per repo).", risk_type: usability, validation_status: validated, date: 2026-07-03 }

sessions:
  - { started: 2026-07-03, phase: 0, notes: "Phase 0 intake: classified flow=new, profile=engineering-repo, characteristics (code_project/complex_domain true; ui_bearing false); multi_user flipped false→true on human feedback (distinct user types → personas/JTBD in scope). Wrote material-inventory.md + inception-state.yaml. Gate 0 approved by human; squash-merged inception/phase-0 to main." }
  - { started: 2026-07-03, phase: 1, notes: "Phase 1 north star & vision: authored canonical 01-north-star.md (reconciled motivation brain dump + 2026-06-16 draft + ADR-0001 TS + PDR-0001 MarkSync brand; removed Go framing), personas-jtbd.md, opportunity-solution-tree.md. Added Persona 5 (sponsoring stakeholder — non-technical business owner/PM/executive) on human feedback. PRD deferred as optional. Red-team-coordinator review run; findings addressed. Gate 1 approved by human; squash-merged inception/phase-1 to main." }
  - { started: 2026-07-03, phase: 2, notes: "Phase 2 scope & roadmap: drafted 02-roadmap.md (MS-0002/MVP=safe one-way publisher trust wedge; MS-0003/MLP=exceptional DX; MS-0004+ future=reverse-sync gates 2-6), assumptions.md (19 assumptions, 4 validated), risks.md (21 risks seeded by the failure premortem + red-team). ui_bearing=false so no screen-inventory/user-journeys. Pre-mortem + four-risk check reflected in the risk register. Red-team-coordinator review + Copilot PR review run; addressed 2 Critical + 6 High + Mediums + all 9 Copilot comments (NSM honesty, concurrency/identity/repair/corpus/Mermaid/drift-classification gaps, security risk, scope-realism, ≤10-min rendering, OAuth/ADR-format consistency). Reviewed ADOS retrospective issues #103/#105/#131 and proactively added backlog-reconciliation.md, failure-premortem.md, and success-pre-parade.md as Phase 2 planning controls. Added id-prefix-catalog.md to standardize grepable IDs/prefixes for future agents and backlog work, including monotonic MS-* roadmap milestone IDs. Expanded 02-roadmap.md with a detailed Next Milestone, future milestone reference subsections, and a roadmap allocation matrix for assumptions/risks/decisions/spikes/backlog triggers. Added retrospective notes for after-phase retro practice, an ADOS process glossary/acronym catalog (e.g. NSM = North Star Metric), and ADOS milestone-management guidance/templates." }
  - { started: 2026-07-04, phase: 3, notes: "Phase 3 tech stack & architecture: drafted tech-stack.md (TypeScript + Bun single-binary; remark/HAST Markdown pipeline; official Mermaid in-process via jsdom+SVG+deterministicIds; Storage render; no DB/telemetry), architecture-overview.md (ports-and-adapters CLI; C4 context+container; 16 components; module governance; push + reverse flows; Confluence v2/v1 isolation), fse-audit.md (10 AI-friendliness attributes), nonfunctional.md (NFRs incl. branch restriction, cache layout, per-version provenance, decentralized concurrency). Seeded doc/decisions/ registry. Wrote ADR-0006 (state model) — flagged must-materialize-in-Phase-3. Posted OPEN-Q1..Q5 on PR #4; human answered (migrate ADRs; create CLI/Git/testing ADRs via @decision-advisor; refine ADR-0006 with UUID v7, decentralized locking, commit-by-commit provenance, branch restriction, single cache dir). Ran @external-researcher (10-area 2026 alternatives report). Delegated ADR-0007 (Cliffy), ADR-0008 (shell-Git), ADR-0009 (bun:test) to @decision-advisor with full context. Migrated ADR-0001..0005 to doc/decisions/ (OPEN-Q1). Refined ADR-0006 (UUID v7, C-6 decentralized, version.message provenance, allowBranches, .marksync/cache CI-cacheable split). Introduced doc/inception/open-questions/phase-3-open-questions.md (durable in-git Q&A). Human answered OPEN-Q6: commit-by-commit default, squash opt-in, full/trimmed Git commit message in Confluence history; delegated ADR-0010 to @decision-advisor and updated docs/state. Retro note for the open-questions-as-files pattern. ui_bearing=false; code_project=true activates testing/CI/conventions in Phase 4." }
  - { started: 2026-07-05, phase: 4, notes: "Phase 4 domain, conventions & quality baseline: drafted glossary.md, ubiquitous-language.md, .ai/rules/testing-strategy.md (6 test tiers, over-mocking guardrail, performance scenarios), .ai/rules/typescript.md (module structure, tsconfig with verbatimModuleSyntax/isolatedModules, Result<T,E> error handling, Biome/dependency-cruiser/bunfig.toml), .github/workflows/ci.yml + run-e2e.yml, doc/guides/dev-environment.md, doc/guides/security-baseline.md, doc/guides/accessibility-baseline.md, .env.example, .editorconfig. 3 red-team rounds (all findings addressed). Owner answered OPEN-Q1..Q7: TDR-0005 (Biome), TDR-0006 (dependency-cruiser), TDR-0007 (@cucumber/cucumber), TDR-0008 (commitlint+husky). External research on version.message limit (undocumented — spike needed). Q8/Q9 deferred to MS-0002. PR comment addressed: rules stripped of process annotations." }
  - { started: 2026-07-06, phase: 5, notes: "Phase 5 ADOS framework integration: generated AGENTS.md (root, MarkSync-customized), .ai/agent/pm-instructions.md (GitHub Issues, lean, references change-lifecycle.md), .ai/agent/pr-instructions.md (GitHub CLI gh blueprint, squash-merge policy), .ai/agent/decision-instructions.md (strategic context calibrated to MarkSync priorities + per-type decision scheme), .ai/agent/code-review-instructions.md (repo-specific checklist: safety invariants, credential security, ports-and-adapters, Result<T,E>, 6-tier testing). Created doc/documentation-profile.md (engineering-repo, business_docs_enabled=false). Customized doc/00-index.md for MarkSync (replaced ADOS-generic tools links with project overview/spec/baselines). Verified doc/documentation-handbook.md, doc/templates/, doc/decisions/00-index.md+README.md, doc/guides/ all present and consistent. All links validated. Red-team round 1 (PASS WITH RISKS → 5 Medium + 2 Low fixed). Owner PR review: 7 comments addressed (decision lifecycle, blocked handling, prioritization+backlog, human-input-needed+chg-questions, auto-delivery/CEO, doc-profile write roots 4→18, README.md created). 7 retro notes (1 repeat + 6 propose-ados-framework-improvement)." }
  - { started: 2026-07-06, phase: 6, notes: "Phase 6 inception readiness check: PASS. Artifact catalog completeness (41/41 present, 7 expected skips). Ghost reference check (243 links, 0 broken in project artifacts; 1 in stale input draft). Cross-document consistency (overview↔spec↔rules↔decisions aligned). FSE verification (10/10 attributes). Four-risk coverage (Value 4, Usability 3, Feasibility 11, Viability 3). Assumption review (5 validated, 2 testing, 12 unvalidated, 0 invalidated). Remediation: all 15 decision records flipped Proposed→Accepted (PRs merged = final per corrected lifecycle). No earlier phase reopened." }

