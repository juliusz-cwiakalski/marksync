# inception-state.yaml
#
# Inception process state tracker for MarkSync for Confluence.
# Instantiated from doc/templates/inception-state-template.yaml in Phase 0.
#
# Resume behavior: a fresh invocation reads this file, determines the current
# (last incomplete) phase, and resumes inception with the state + prior
# artifacts as context. See doc/guides/project-inception.md.
#
# Workflow note: this project runs inception as one branch+PR per phase. The
# human gate for each phase is satisfied by reviewing and merging that phase's
# PR to main. A phase is therefore flipped to `completed` only after its PR
# merges (state updated in the *next* phase's PR).
schema_version: 1

project:
  name: MarkSync for Confluence
  flow: new                 # greenfield: no product source committed; rich inception inputs only
  profile: engineering-repo # software product (TS CLI/library); strategy docs are inception inputs
  characteristics:
    ui_bearing: false       # CLI tool; DX handled as quality concern in Phase 4
    multi_user: true        # distinct user types (dev, tech writer, maintainer…) → personas/JTBD activated
    complex_domain: true    # Storage/ADF, content properties, drift, ownership, atomicity → ubiquitous language
    code_project: true      # TS product → testing strategy, CI baseline, dev env, conventions

phases:
  # status: pending | in_progress | completed
  - { id: 0, name: "Intake & material scan", status: completed, started: 2026-07-03, completed: 2026-07-03 }
  - { id: 1, name: "North star & vision", status: completed, started: 2026-07-03, completed: 2026-07-03 }
  - { id: 2, name: "Scope & roadmap", status: completed, started: 2026-07-03, completed: 2026-07-04 }
  - { id: 3, name: "Tech stack & architecture", status: completed, started: 2026-07-04, completed: 2026-07-05 }
  - { id: 4, name: "Domain, conventions & quality baseline", status: completed, started: 2026-07-05, completed: 2026-07-05 }
  - { id: 5, name: "ADOS framework integration", status: completed, started: 2026-07-06, completed: 2026-07-06 }
  - { id: 6, name: "Inception readiness check", status: completed, started: 2026-07-06, completed: 2026-07-06 }
  - { id: 7, name: "Inception summary & handoff", status: pending, started: null, completed: null }

