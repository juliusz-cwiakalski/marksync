decisions:
  - text: >
      OQ-1 resolved (PM-decided): Add a new `RemoteUnreachable { kind:
      "RemoteUnreachable"; status?: number; cause: string }` arm to MarkSyncError
      for exhausted-5xx/network failures, alongside the story-mandated RateLimited
      arm. Rationale: different recovery action than RateLimited (server-down/
      alert-operator vs wait-and-retry); follows codebase principle "add a kind
      only when recovery action differs" + AuthUnreachable precedent; additive +
      exhaustiveness-checked. If DoR reviewer/user prefers a formal TDR, write
      post-delivery.
    date: 2026-07-09
    ref: OQ-1
  - text: >
      OQ-2 resolved (PM-decided): RateLimited shape = { kind: "RateLimited";
      retryAfterMs?: number } — minimal, carries last observed Retry-After.
    date: 2026-07-09
    ref: OQ-2
  - text: >
      Review iter-1 MAJOR (AC-F5-1b): /data attachment update unreachable via
      port. Resolved as option (c) — the simplest path (supersedes the
      tentative (b) above; directed by decision authority / user). Remove the
      orphaned AttachmentService.update() + TC-UPD-001; document in
      attachments.ts that hash-derived filenames (marksync-mermaid-<hash>.svg /
      marksync-asset-) make in-place /data update unnecessary for MS-0002:
      changed bytes → new hash → new filename → fresh create, never a same-name
      dup. The /data version-bump path is unreachable by design, so no port op
      is needed and the port surface stays clean.
    date: 2026-07-10
    ref: REVIEW-1-MAJOR

