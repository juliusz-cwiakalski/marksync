decisions:
  - text: >
      OQ-1 (fetch-back failure fallback): store `remoteBodyHash = rawHash(renderedBody)`
      (the raw hash of the body just written). Rationale: same hash domain (raw)
      so if Confluence didn't normalize, next sync is NoOp; if it did normalize,
      a rare one-time false-positive block occurs (fetch-back failure is ≤0.1%).
      Emit a warning. Avoids cross-domain mismatch of storing canonical hash.
      PM-decided — low-risk, reversible, edge case.
    date: "2026-07-13"
  - text: >
      OQ-2 (fetch-back timing): after asset upload. The rendered body already
      contains `<ri:attachment>` references; uploading assets doesn't change
      the body string. Fetch-back after upload captures the final committed
      state and ensures ordering consistency (all writes done before read-back).
      PM-decided — follows naturally from write-ordering.
    date: "2026-07-13"

