    message: >
      TC-FETCH-003 simulates fetch-back failure by overriding target.getPage to fail
      on the first call (getPageCallCount === 1), with an inline comment explaining
      the internal call-ordering assumption ("For a new doc (Create), computePlan
      doesn't call getPage"). This is brittle: if computePlan or processEntry call
      ordering changes, the test silently tests the wrong call. The test also leaves
      the monkey-patched getPage in place (no restoration), though the target is
      local to the test so this is low impact.
    suggestion: >
      Prefer a FakeTarget configuration flag (e.g. `failNextGetPage: boolean`) over
      raw monkey-patching, keyed to the pageId of the just-created page rather than
      call-count index, so the test is robust to call-ordering changes.
