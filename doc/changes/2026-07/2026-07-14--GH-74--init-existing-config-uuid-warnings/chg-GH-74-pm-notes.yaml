  - text: >
      Retro — @plan-writer found a completeness gap in the test plan during
      delivery_planning: TC-REG-001 claimed 'all existing tests pass without
      modification (except those explicitly changed by spec)' and only enumerated
      the unit-level overwrite-refusal test. Two additional existing tests assert
      the old refused-overwrite behavior (tests/integration/identity/identity-assign.test.ts
      TC-ASSIGN-005 at line 124, and the DEC-5 redaction test at init.test.ts:65).
      TC-ASSIGN-005 will hard-fail after F-1. Plan-writer compensated by adding
      Phase 1 tasks 1.4 and 1.5 to modify both tests. Test plan TC-REG-001 should
      have enumerated these. Root cause: test-plan-writer did not scan integration
      tests for assertions tied to the old behavior. Process improvement:
      test-plan-writer should grep for assertions referencing the behavior being
      changed, not just unit tests.
    type: retro
