notes:
  - text: >
      Intake analysis — clean P0 bug, root cause + fix explicit in ticket.
      parseMarkdown (src/domain/markdown/parse.ts) builds `remark().use(remarkGfm)`
      without remark-frontmatter, so the `---` front-matter fences are parsed as
      thematic breaks and the YAML body as headings/paragraphs → leaks into the
      rendered Confluence Storage XHTML.
    type: info
    date: "2026-07-13"
  - text: >
      readUuid (src/domain/identity/frontmatter.ts) uses its OWN findFrontMatter
      parser (pure string scan + yaml.parse) — fully independent of parseMarkdown.
      Therefore adding remark-frontmatter to parseMarkdown CANNOT affect UUID
      reads; AC#2 (UUID still read by readUuid) is inherently safe. No regression
      risk to identity/init flows.
    type: info
    date: "2026-07-13"
  - text: >
      Golden harness note: tests/golden/markdown/storage-renderer.test.ts asserts
      fixtures.length===26 and pairs every .md with a .storage.xhtml. Adding a
      front-matter fixture bumps count to 27 and requires updating the assertion
      (AC#3 permits golden updates). kitchensink.md has no front-matter. No
      existing .md fixture starts with `---` front-matter (hr.md uses `---` as a
      thematic rule mid-document, NOT at column-0 line 0 — remark-frontmatter only
      treats a `---` at the very start of the document as front-matter, so hr.md
      is unaffected).
    type: info
    date: "2026-07-13"
  - text: >
      Spec doc impact: feature-safe-publish.md line ~142 documents the pipeline
      as `remark + remark-gfm`; doc-syncer should note `remark-frontmatter`
      addition. No other current-truth doc references parseMarkdown internals.
    type: info
    date: "2026-07-13"
  - text: >
      No blocking questions — requirements complete and consistent with system
      spec. Proceeding to artifact generation.
    type: info
    date: "2026-07-13"
