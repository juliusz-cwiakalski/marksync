summary: >
  The P0 fix is correct and complete. PropertyService now uses v1 key-based
  GET/POST/PUT throughout — no v2-by-key path remains. The version-extraction
  mechanism (POST 409 → fetchCurrentVersion via raw v1 GET + PropertyV1Response
  parse → updateByKey with version.number+1) matches the spec exactly. All error
  mappings are correct (403→Forbidden, 404-GET→ok(undefined), 413→TooLarge,
  schema-fail→RemoteUnreachable, property-PUT-409→RemoteUnreachable per DEC-6).
  The DEC-6 decision is sound: the putProperty consumer (push-flow.ts) blocks on
  any error without special Conflict handling, and the Conflict kind is
  page-shaped. All 34 tests pass; typecheck and lint clean. Docs are reconciled
  (feature spec, architecture, glossary, test spec, roadmap, ADR-0006). The only
  gaps are plan-tracking hygiene (phases 3–5 done in code but unchecked) and
  minor edge-case test coverage in the fallback paths — neither is a code defect.
