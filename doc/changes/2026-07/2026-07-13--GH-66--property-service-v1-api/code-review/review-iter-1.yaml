    location: src/infra/confluence/properties.ts:154-169 (updateByKey no 413 branch)
    message: >
      Unlike put(), updateByKey() has no 413/too-large → TooLarge branch. A 413 on
      the PUT would fall through to the catch-all RemoteUnreachable instead of
      TooLarge. This is academic: POST already validated the body size (it
      returned 409, not 413), and the PUT body carries the same value plus a tiny
      version object — a 413 on PUT after a 409 on POST is near-impossible.
    suggestion: >
      No action required. If desired for symmetry, a 413 branch could be added to
      updateByKey, but the practical risk is negligible.
