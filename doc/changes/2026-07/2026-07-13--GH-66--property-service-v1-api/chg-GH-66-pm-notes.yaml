decisions:
  - text: >
      PM-DEC-1 (DoR iter-1, finding 1): DEFER property-PUT-409→Conflict to
      post-MS-0002. Map property-PUT-409 → RemoteUnreachable (the existing
      catch-all). Rationale: (a) the GET-version-then-PUT flow makes 409 rare
      (only a concurrent-write race in the GET→PUT window); (b) operationId
      dedup + per-doc isolation (GH-24) prevents self-racing within one sync;
      (c) the putProperty consumer (push-flow.ts L1201) blocks on ANY error
      without special Conflict handling — the re-fetch-once dance is gated on
      updatePage only (L900) — so a Conflict provides no retry benefit; (d) the
      Conflict error kind is page-shaped (pageId/baseVersion/remoteVersion) and
      would mislead the error mapper + user for a property conflict. Recovery
      for the rare race = RemoteUnreachable → blocked → user re-runs sync →
      re-GETs current version. Spec OQ-2/RSK-4/Appendix B re-resolved to match.
    date: "2026-07-13"
