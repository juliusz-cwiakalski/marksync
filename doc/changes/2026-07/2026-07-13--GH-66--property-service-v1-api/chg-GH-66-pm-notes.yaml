notes:
  - text: >
      Intake (2026-07-13): P0 bug. State detection: OPEN, no PR, on main, clean
      tree → fresh delivery. Labels applied: change, in-progress.
    type: info
    workItemRef: GH-66
    date: "2026-07-13"
  - text: >
      Root cause confirmed in src/infra/confluence/properties.ts: get() (L22) and
      updateByKey() (L103) build v2 paths `/pages/{id}/properties/{key}` but the
      v2 API path param is a property ID (UUID/numeric), not a key. Result: 400
      on every GET/PUT by key. POST create (L65, v2 `/pages/{id}/properties`)
      passes key in the body, which v2 accepts. The ticket's evidence is
      consistent with the code: v2 GET by key → 400; v1 GET by key → 200; v2
      list → 200.
    type: info
    workItemRef: GH-66
    date: "2026-07-13"
  - text: >
      Spec cross-check vs doc/spec/features/feature-confluence-adapter.md: §3.1
      (L55-57), §3.2 table (L78 "Content properties | v2 | marksync.metadata
      key; v1 deprecated"), §4.2 (L127 PropertyService "via v2") all assert
      content properties use v2. This is precisely the bug — the spec claims v2
      works for key-based access but it does not. Doc-syncer (phase 7) must
      reconcile these to v1 for key-based GET/PUT. No contradiction with ticket;
      the spec is simply wrong on this point and this change corrects both code
      and spec.
    type: info
    workItemRef: GH-66
    date: "2026-07-13"
  - text: >
      RISK/consideration for spec-writer: v1 content-property PUT-by-key
      (`PUT /rest/api/content/{id}/property/{key}`) may require a
      `version.number` in the body for optimistic concurrency on UPDATE (Confluence
      returns 409/400 if the version is omitted/stale when the property exists).
      The current v2 updateByKey path sends only `{key, value}`. The spec MUST
      define how the update path resolves the version: (a) GET-by-key first to
      learn the current version, then PUT with version+1; or (b) POST create,
      on key-exists conflict GET version then PUT with version. This is the one
      non-trivial scope detail — the fix is NOT a one-line path swap for the PUT
      arm. Flag for DoR attention.
    type: risk
    workItemRef: GH-66
    date: "2026-07-13"
  - text: >
      clarify_scope COMPLETE. No blocking questions. Ticket is detailed
      (root cause, evidence, fix, AC all present and consistent with code). AC
      are testable. Proceeding to artifact generation.
    type: resolved
    workItemRef: GH-66
    date: "2026-07-13"
  - text: >
      RETRO — DoR iter-1 returned NOT_READY (3 blocking findings). Finding 1:
      spec resolved property-PUT-409→Conflict but plan+test-plan dropped it.
      Finding 2: test TC-PROP-V1-ERR-002 tests GET 413→TooLarge, but get() has
      no 413 branch (413→TooLarge is put()-only) — wrong code path tested, and
      the real put() POST-413 path untested. Finding 3: plan Phase 2 version-
      extraction mechanism ambiguous (public get() returns string|undefined,
      discards version — can't supply currentVersion to updateByKey). Gap
      discovered at DoR, not caught by spec/test-plan/plan authors. Process
      improvement: the version-extraction mechanism and the 409-error-mapping
      table should have been cross-checked between spec and plan during authoring;
      the test-plan ERR-002 should have been validated against the actual get()
      error branches. DoR gate earned its keep here. Reopening specification
      (PM-DEC-1 re-resolution + schema `when` optional), test_planning,
      delivery_planning.
    type: retro
    workItemRef: GH-66
    date: "2026-07-13"
