    date: "2026-07-07"
  - text: "DoR iter-1 PM decision (OQ-TP-2): CI commit-message-lint job is IN-SCOPE for GH-14. Rationale: GH-14 IS the OPEN-Q9 execution story (makes CI binding); TDR-0008 C-2 (non-negotiable) requires BOTH local hook AND CI gate; TDR-0008 Implementation Plan step 4 ties the CI commit-lint job to 'MS-0002 start (OPEN-Q9 checklist)' = this story; shipping the new commit-convention gate with no authoritative CI half contradicts the story's own thesis; cost is trivial (one CI step + one AC + one TC). The spec over-claimed 'CI authoritative' without an AC/plan task — bringing it in-scope resolves the contradiction cleanly. Reviewer's DEFERRED alternative rejected (more artifact churn, leaves story arguing against itself)."
    date: "2026-07-07"

open_questions:
  - text: "OQ-TP-2 (surfaced by test-plan-writer): Spec F-4 claims CI is 'authoritative' for commit-message enforcement, but no commitlint CI job/action is wired in ci.yml today and no AC requires it. TDR-0008 C-2 requires BOTH local hook AND CI gate (defense-in-depth). The plan wires the husky commit-msg local hook but the CI-side commit-lint job is not explicitly scoped. DoR reviewer to assess whether the CI commit-lint job is in-scope for this story or deferred. (PM note: the husky local hook satisfies the story's literal AC-6 'commitlint hook fires on bad commit message'; the CI authoritative half is a TDR-0008 C-2 requirement but the story scope lists only 'commitlint + husky'. This is a candidate DoR finding.)"
    date: "2026-07-07"
    status: "RESOLVED — PM decided CI commit-lint job IN-SCOPE (see decisions). Spec AC-F4-3 + test-plan TC-COMMITS-003 + plan task 8.5 added; DoR iter-2 READY."
  - text: "DoR iter-2 non-blocking carryforwards (cosmetic, do not gate delivery): (a) plan §'Test Scenarios' summary index + Phase 8 AC bullets don't list AC-F4-3/TC-COMMITS-003 though task 8.5 covers them verbatim — coder should add AC-F4-3 to Phase 8 AC bullet list when finalizing; (b) test-plan §3.3 NFR-6 row wording still says 'pinned in CI' without the spec's 'fast-loop only; dep-audit may float' nuance (TC-TOOLCHAIN-001 is already correctly scoped) — cosmetic."
