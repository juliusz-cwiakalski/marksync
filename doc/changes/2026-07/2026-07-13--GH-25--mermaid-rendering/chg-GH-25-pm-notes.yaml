  - text: >
      Scoping finding (load-bearing for spec): the code-policy fallback is ALREADY
      the de-facto pipeline behavior. A ```mermaid fence → <pre><code
      class="language-mermaid"> → codeMacro() (src/infra/confluence/render/storage.ts:185)
      → Confluence code macro with language=mermaid. No renderer exists. So the
      re-scoped story is SMALL: (1) flip the config default so it reflects MS-0002
      reality instead of the misleading "render"; (2) add explicit tests proving
      mermaid fences are preserved byte-stable as code macros; (3) adversarial
      fixtures (safe by construction — content is CDATA-escaped inside a code
      macro); (4) document the fallback ladder as the MS-0002 operating default.
    type: info
    workItemRef: GH-25
    date: "2026-07-13"
  - text: >
      Pre-existing inconsistency for the spec-writer to resolve: MermaidPolicy
      enum is "render" | "skip" (src/domain/config/types.ts:31), but ADR-0002
      names rung 7 the "code" policy and C-2 lists policy values error|code|macro.
      There is no "code" value in the enum, and the policy is declared but never
      consumed (no code reads config.render.mermaid.policy). The spec must decide
      the canonical MS-0002 policy model: likely add "code" to the enum and make
      it the default (aligning config with ADR-0002 terminology), OR repurpose
      the existing values. Config default (config.ts:147) and starter template
      (config-template.ts:75) both currently ship "render".
    type: info
    workItemRef: GH-25
    date: "2026-07-13"
  - text: >
