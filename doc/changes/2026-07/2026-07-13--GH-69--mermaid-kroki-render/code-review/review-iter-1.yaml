  - id: F-6
    severity: info
    confidence: medium
    category: correctness
    location: src/domain/mermaid/transform.ts:33
    message: >
      transform() declares `Result<TransformResult, MarkSyncError>` but always
      returns ok — every renderer error is collected as a warning, never
      propagated. The `if (!mermaidResult.ok)` guard in push-flow.ts:244 is
      therefore dead code. This is defensible as future-proofing but the type
      currently overpromises a failure mode that does not exist.
    suggestion: >
      Either (a) leave as-is with a one-line comment noting the error channel
      is reserved for future fatal transform failures, or (b) simplify the
      return type to `Promise<TransformResult>` and drop the dead guard.
      Non-blocking; pick one for consistency.
