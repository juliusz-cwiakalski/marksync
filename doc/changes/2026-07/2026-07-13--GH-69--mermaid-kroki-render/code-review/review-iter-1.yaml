  - id: F-1
    severity: medium
    confidence: high
    category: correctness
    location: src/domain/mermaid/transform.ts:130
    message: >
      imgNode() hardcodes the `marksync-mermaid-<hash>.svg` format, mirroring
      the infra-tier attachmentFilename() (src/infra/confluence/attachments.ts:140).
      The two must produce byte-identical strings for <ri:attachment> to match
      the uploaded filename. A comment acknowledges the duplication (transform.ts
      lines 120-124) but no compatibility test asserts the two stay in sync —
      code-review-instructions.md §"Structural type duplication" requires one.
      TC-MERM-001 hardcodes the expected filename independently, so a future
      change to attachmentFilename() would pass all current tests yet silently
      break mermaid image references on Confluence.
    suggestion: >
      Add a sync assertion that derives the expected ri:filename from
      attachmentFilename(artifact) rather than a hardcoded string, so a naming
      drift fails the test. One test in the integration suite suffices.
