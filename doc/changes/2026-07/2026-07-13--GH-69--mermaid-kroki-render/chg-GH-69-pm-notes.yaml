notes:
  - text: >
      RETRO (DoR iter-1, 2026-07-13): NOT_READY — 1 BLOCKER + 2 MAJOR found by
      @readiness-reviewer. BLOCKER: plan P3.1 placed the mermaid transform
      BEFORE resolver.resolve() in computePlan. Because AssetResolver walks
      every non-http <img src> as a local file path (realpathSync), the
      synthetic marksync-mermaid-<hash>.svg img nodes injected by the transform
      would trigger Forbidden(path-traversal) and abort every plan containing a
      mermaid fence. Fix: order is mdastToHast → resolver.resolve (real local
      images only) → mermaid transform (inject synthetic img) → renderBody.
      MAJOR: spec body was never reconciled with the PM full-hash decision
      (made in clarify_scope/specification review) — 8+ stale "truncated to 24
      chars" references + a phantom mermaidFilename() helper that the plan
      correctly omits. Root cause: the PM decision to supersede spec DEC-4 was
      recorded in pm-notes but the spec-writer had already authored the spec
      against the ticket's sha256-24 shorthand BEFORE the decision was made, and
      the spec was never re-synced. Process improvement: when PM makes a
      decision that contradicts an already-written artifact, re-delegate to that
      artifact's author to reconcile BEFORE proceeding to the next phase, rather
      than only recording the override in pm-notes. Reopening specification +
      delivery_planning + test_planning (MINOR empty-source edge case).
    type: retro
    workItemRef: GH-69
    date: "2026-07-13"
  - text: >
      Intake (2026-07-13): GH-69 OPEN, no PR, no branch — fresh delivery. State
      detection: ticket OPEN, no open/closed PRs for GH-69, on `main` clean.
      Parked GH-63 (PR #68 open, awaiting review) to take up GH-69 per explicit
      user request. Added `change` + `in-progress` labels (change was missing —
      mandatory per pm-instructions). Business ID MS2-E4 (epic-level; the
      deferred `render` policy from CEO-DEC-1/GH-25). Dependencies GH-25 (code
      policy default) + GH-26 (asset pipeline) both merged. Loaded story context:
      MS2-E4 epic, MS2-E4-S1 mermaid-rendering story, feature-mermaid-rendering
      spec, ADR-0002, NFR-PRIV-2.
    type: info
    workItemRef: GH-69
    date: "2026-07-13"
  - text: >
      Scope cross-check vs system spec: the `MermaidPolicy` enum
      (`"code" | "render" | "skip"`) and config types are in place (GH-25); the
      `TargetSystem` port already has `uploadAttachment`/`attachmentExists`/
      `listAttachments` (GH-21); the `Artifact` type already has the
      `kind?: "asset" | "mermaid"` marker (GH-26 foreshadowed this); `PlanEntry`
      .`assets?: Artifact[]` carries artifacts for upload; `uploadAssets()` in
      push-flow handles dedup via `attachmentExists`. The AssetResolver only
      walks `<img>` — mermaid fences (`pre>code.language-mermaid`) are NOT yet
      intercepted; the storage renderer currently emits them as code macros
      (codeMacro). The render-policy implementation must insert a HAST transform
      between mdastToHast and renderStorage that (1) finds mermaid fences,
      (2) renders via Kroki, (3) builds an Artifact, (4) replaces the fence
      with an `<ac:image><ri:attachment ri:filename="marksync-mermaid-<hash>.svg"/></ac:image>`
      raw node (or img element), (5) appends the artifact to the entry's assets.
    type: info
    workItemRef: GH-69
    date: "2026-07-13"
