decisions:
  - text: >
      PM-decided (clarify_scope): the public-Kroki privacy tension (NFR-PRIV-2 /
      ADR-0002 C-3 require remote rendering opt-in + warning) resolves cleanly
      WITHOUT blocking human input. The `render` policy is already opt-in
      (`code` is the config default since GH-25). The implementation must emit a
      one-time privacy warning when `render` activates against a remote endpoint
      (public kroki.io). This satisfies C-3 ("off by default with a warning") and
      keeps delivery unblocked. A self-hosted Kroki endpoint config is a
      forward-compatible extension but NOT in this change's scope (public
      kroki.io is the demo-reachable path per the ticket).
    date: "2026-07-13"
  - text: >
      PM-decided (clarify_scope): determinism + content-hash dedup. The artifact
      filename `marksync-mermaid-<sha256-24>.svg` is derived from a hash of the
      SVG bytes Kroki returns (parallel to GH-26's `marksync-asset-<hash>.<ext>`
      over file bytes). The existing `Artifact` type already carries
      `kind?: "asset" | "mermaid"` for exactly this distinction. Dedup reuses
      the GH-26 `attachmentExists(pageId, hash)` path ‚Äî unchanged diagram ‚Üí same
      SVG ‚Üí same hash ‚Üí no re-upload. Determinism of Kroki output is a test-plan
      concern (golden/byte-stability probe).
    date: "2026-07-13"
  - text: >
      PM-decided (specification review, supersedes spec DEC-4 truncation): use
      the FULL sha256 hex in the mermaid attachment filename ‚Äî NOT truncated to
      24 chars. Verified that `src/infra/confluence/attachments.ts`
      `attachmentFilename(artifact)` ALREADY produces
      `marksync-mermaid-<artifact.hash>.svg` when `kind === "mermaid"` and uses
      `artifact.hash` as-is. GH-26 assets use the full 64-hex hash in their
      filenames (`marksync-asset-<64hex>.<ext>`). To keep the mermaid path
      symmetric with the asset path and require ZERO changes to
      `attachmentFilename()`, the mermaid Artifact.hash stores the full sha256.
      The ticket's `marksync-mermaid-<sha256-24>.svg` is descriptive shorthand;
      AC-5 (determinism: same source ‚Üí same hash ‚Üí same filename) is satisfied
      by the full hash. Truncation would add collision risk, break round-trip
      symmetry with `hashFromFilename()`, and diverge from GH-26 for no benefit.
      Downstream agents (test-plan, plan, coder) MUST use the full hash; the
      spec's DEC-4 truncation clause is superseded by this decision.
    date: "2026-07-13"
  - text: >
      Verified (specification review): the upload pipeline is already
      mermaid-ready. `src/infra/confluence/attachments.ts`: `AttachmentService`
      .`upload()` calls `attachmentFilename(artifact)` which prefixes
      `marksync-mermaid-` for `kind === "mermaid"`; `exists()` dedups by full
      hash; the 400 "same file name" path is idempotent. So the mermaid
      transform only needs to build `Artifact { bytes, mime: "image/svg+xml",
      hash: <full sha256>, kind: "mermaid" }` and append to PlanEntry.assets ‚Äî
      upload/dedup is reused verbatim from GH-26. The plan-writer should NOT
      touch `attachmentFilename()` or `AttachmentService`.
    date: "2026-07-13"

