  - text: >
      Scope cross-check vs system spec: the `MermaidPolicy` enum
      (`"code" | "render" | "skip"`) and config types are in place (GH-25); the
      `TargetSystem` port already has `uploadAttachment`/`attachmentExists`/
      `listAttachments` (GH-21); the `Artifact` type already has the
      `kind?: "asset" | "mermaid"` marker (GH-26 foreshadowed this); `PlanEntry`
      .`assets?: Artifact[]` carries artifacts for upload; `uploadAssets()` in
      push-flow handles dedup via `attachmentExists`. The AssetResolver only
      walks `<img>` ‚Äî mermaid fences (`pre>code.language-mermaid`) are NOT yet
      intercepted; the storage renderer currently emits them as code macros
      (codeMacro). The render-policy implementation must insert a HAST transform
      between mdastToHast and renderStorage that (1) finds mermaid fences,
      (2) renders via Kroki, (3) builds an Artifact, (4) replaces the fence
      with an `<ac:image><ri:attachment ri:filename="marksync-mermaid-<hash>.svg"/></ac:image>`
      raw node (or img element), (5) appends the artifact to the entry's assets.
    type: info
