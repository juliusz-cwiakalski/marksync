decisions:
  - id: PM-RECON-1
    text: >
      DoR iter-1 NOT_READY — 4 blocking findings (parallel authoring divergence).
      PM-set authoritative reconciliation decisions (apply across all artifacts):
      (A) parseDocumentId returns Result<DocumentId, DocumentIdError> with a
      NARROW domain-local DocumentIdError (NOT a new MarkSyncError arm — none
      exists for invalid doc-id and error rules forbid adding one). assertUuidV7
      throws on invariant violation; parseDocumentId returns Result for untrusted
      input. (B) Duplicate-UUID collision reporting = FIRST-COLLISION-ONLY
      (return on first UUID with >1 path, listing all its paths in paths[]);
      fits existing {kind:"DuplicateUuid"; uuid; paths[]} shape; report-all
      deferred. (C) Authoritative test layout: tests/domain/identity/{uuid,
      document-id, frontmatter, duplicate-detector}.test.ts + tests/domain/
      binding/page-binding.test.ts (unit) + tests/integration/identity/
      identity-assign.test.ts (integration, real file I/O via temp dirs) +
      tests/bdd/features scenario draft (step defs E5-S1/GH-29). TC-DUP-007
      (halt-signal) folds into duplicate-detector.test.ts. (D) Scale: relax
      AC-F4-3 ≤5ms p95 to an NFR; assert O(n) + coarse smoke "completes on 500
      docs" (TC-SCALE-001), no strict ms (CI-flaky). (E) Decision IDs: spec=
      DEC-#, plan= PD-# (no collision). (F) Reconcile test-plan provisional
      F-IDENTITY-*/DM-IDENTITY-* to spec F-#/AC-#/DEC-#. (G) TC-DUP-006 must
      stay the error-arm regression; scale test = TC-SCALE-001.
    date: 2026-07-09

