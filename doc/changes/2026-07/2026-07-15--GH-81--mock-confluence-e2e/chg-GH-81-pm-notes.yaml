notes:
  - text: >
      Intake (2026-07-15): priority:high, MS-0002, feature. Clean new delivery on
      main (no resume-sync; clean tree). No story file (no [MS2-Exx-Sxx] prefix);
      ticket body is authoritative. Goal: mock Confluence HTTP server + e2e
      scenarios wired into ci.yml as mandatory `e2e-mock` job (no secrets) to
      catch HTTP adapter regressions (GH-71/GH-66 class) without live Confluence.
    type: info
    date: "2026-07-15"
  - text: >
      Code cross-check — ticket endpoint table is INACCURATE (resolvable from
      code; spec will correct). ACTUAL endpoints marksync calls:
      Pages (v2): POST /wiki/api/v2/pages, GET /wiki/api/v2/pages/{id}?body-format=storage,
        PUT /wiki/api/v2/pages/{id} (update + move).
      Properties (v1 content-property REST — NOT jsongraphs): GET/POST
        /wiki/rest/api/content/{id}/property[/{key}], PUT .../property/{key} (version
        incremented after POST-409→GET-version).
      Attachments (v1): POST + GET /wiki/rest/api/content/{id}/child/attachment
        (multipart upload; 400 "same file name" = idempotent dedup signal).
      Credential validation: GET /wiki/api/v2/user/by-me (MISSING from ticket).
      Port-exposed but NOT on sync critical path: GET /wiki/rest/api/search?cql=,
        GET /wiki/rest/api/content/{id}/restriction.
      Ticket errors: (1) listed /wiki/api/v2/pages/{id}/attachments (should be v1
        /content/{id}/child/attachment); (2) listed /wiki/api/v2/content/{id}/child/attachment
        (wrong base, should be v1 /rest/api/content/); (3) listed /wiki/api/v2/pages/{id}/properties
        (should be v1 /rest/api/content/{id}/property); (4) listed
        /api/jsongraphs/property-service/property (NOT USED — GH-66 removed it;
        ticket cites GH-66 as motivation but lists the old broken endpoint).
      409 conflict envelope is shape-specific: { errors:[{code:"CONFLICT",
        title:"...Current Version: [N]...Provided version: [M]"}] } — mock must
        reproduce exactly for conflict-recovery scenario.
    type: info
    date: "2026-07-15"
  - text: >
      Design note (non-blocking, for spec-writer): testing-strategy.md defines
      tests/e2e/ as the LIVE-SANDBOX tier (run-e2e.yml runs `bun test tests/e2e/`
      against real Confluence with secrets). Putting mock tests in tests/e2e/
      would make run-e2e.yml run them against the live sandbox too. Recommend a
      SEPARATE folder (e.g. tests/e2e-mock/) so tiers stay clean and ci.yml can
      target it independently. Also: existing integration tests
      (tests/integration/confluence/confluence-target.test.ts,
      push-flow.test.ts) already use Bun.serve + ConfluenceTarget.fromCredentials
      built directly (bypassing resolveCredentials https-gate) — GH-81's value-add
      is a richer STATEFUL reusable mock (in-memory Map, version conflicts,
      attachment dedup) + multi-page scenario suite + mandatory CI gate.
    type: info
    date: "2026-07-15"
  - text: >
      Retro — DoR iter-1 NOT_READY (2026-07-15): readiness-reviewer caught 3
      blocking + 3 non-blocking gaps, all verified against actual code. Blocking:
      (1) TC-E2EMOCK-002 asserts GET /user/by-me captured in create flow, but
      validateCredentials is the ONLY caller and computePlan/applyPlan never call
      it — unreachable under DEC-1, would fail at runtime; (2) TC-E2EMOCK-008 says
      "fresh mock" + expects POST→409→GET→PUT, but on a fresh mock the property key
      doesn't exist so POST returns 2xx and the 409 path never fires —
      self-contradictory; (3) spec §8.1 property GET/PUT shape omits the
      schema-REQUIRED `id` field (PropertyV1Response requires id: string|number) —
      mock built to spec literal shape fails safeParse → RemoteUnreachable.
      Non-blocking: search/restrictions never driven by pipeline (re-trace to
      smoke); TC-005 attachment-dedup vacuous (NoOp short-circuits before
      uploadAssets); AC-4 GH-66→AC-F2-5 linkage loose (panel is in page body via
      createPage, independent of putProperty). Reopening specification +
      test_planning; realigned delivery_planning after.
    type: retro
    date: "2026-07-15"
  - text: >
      Retro — DoR iter-3 READY (2026-07-15): after 2 NOT_READY iterations
      (unreachable user/by-me assertion, self-contradictory TC-008, missing
      property `id`, and the persistent unreachable-400-dedup-path), the
      artifacts are now sound. Key lesson: the spec/test-plan authors initially
      traced assertions to the ADAPTER surface (what endpoints exist) rather than
      to the PIPELINE call sites (what computePlan/applyPlan actually invoke).
      The 400 dedup path was particularly subtle — it's "unreachable by design"
      per the adapter's own comments, because uploadAssets prechecks with
      attachmentExists before uploading. The DoR adversarial gate caught all of
      this; 3 iterations was the right cap. Reviewer left 3 non-blocking
      delivery-time notes (exact-count precision for TC-004 GETs; TC-006 wording;
      filter CapturedRequest[] by method+path when implementing count asserts).
    type: retro
    date: "2026-07-15"
