decisions:
  - id: DEC-1
    text: >
      PM-decided (2026-07-15): adopt Option B — programmatic full-pipeline e2e.
      Mock e2e tests run computePlan + applyPlan against a Bun.serve() mock via
      ConfluenceTarget.fromCredentials constructed directly (bypassing
      resolveCredentials), following the established
      tests/integration/confluence/confluence-target.test.ts pattern. NO change
      to src/app/credentials.ts (isHttpsUrl stays https-only). Rationale: (1)
      satisfies all 4 ACs literally (AC-1 endpoints, AC-2 scenarios, AC-3 CI job,
      AC-4 adapter-regression coverage); (2) least-privilege / paved-road — zero
      production/security-code change, fully reversible; (3) the ticket's stated
      motivation is HTTP-adapter regressions (GH-71/GH-66), which Option B catches
      exactly since the adapter is exercised through the full pipeline; (4) the
      "CLI flow" language lives in Proposed Design (suggestion), not the ACs
      (contract). Option A (CLI binary + loopback-http relaxation in
      credentials.ts) deferred — available as a follow-up if the human wants
      CLI-shell/resolveCredentials coverage; will be surfaced in the PR
      description for review. Trade-off accepted: e2e does not exercise the CLI
      argument shell or the https-gate in resolveCredentials (those stay covered
      by unit/integration tests).
    date: "2026-07-15"
    authority: PM-decided (autonomous, per least-privilege + ACs-satisfied)

open_questions:
  - id: OPEN-Q1
    text: >
      Scope/security fork: ticket proposes running the full `marksync` CLI flow
      (init → plan → sync) against a mock via
      `MARKSYNC_CONFLUENCE_BASE_URL=http://localhost:<port>`, but
      `resolveCredentials()` (src/app/credentials.ts) rejects non-https base URLs
      (`isHttpsUrl` requires `https:`). Resolved by DEC-1 (Option B).
    date: "2026-07-15"
    status: resolved
    resolution: DEC-1

