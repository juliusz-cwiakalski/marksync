summary: >
  The mock Confluence server is solid: it implements every corrected §8.1 endpoint,
  the page-PUT 409 envelope round-trips through parseConflict (AC-F1-2 verified),
  property responses carry the required `id`, attachment create responses are
  { results: [...] }-wrapped, jsongraphs 404s, state resets per scenario, and the
  instant `delay` seam keeps the suite deterministic (13/13 pass in 559 ms; DEC-1/2/3
  all honored; CI job is mandatory, secrets-free, pinned to Bun 1.2.23). However two
  issues block merge. (1) AC-4 is not literally satisfied: it requires AC-F2-1
  (create-flow / TC-E2EMOCK-002) to FAIL if the GH-71 attachment-unwrap regression is
  reintroduced, but create-flow performs 0 attachment uploads (fixtures carry no real
  image asset; Mermaid is rendered as `code`), so the unwrap path is never exercised
  there — the regression lock is incidentally held by TC-E2EMOCK-005 run-1 instead,
  and the test diverges from its own test-plan steps 5-6 (which assert 2 uploads + an
  unwrap assertion). (2) All 10 new test files fail `bun run format:check`, so the
  full local gate `bun run check` is broken (contradicting plan Phase 6 task 6.3).
