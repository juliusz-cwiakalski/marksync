    location: src/app/push-flow.ts:539,552,766
    message: >
      Pre-existing (NOT a GH-81 regression; src/ is untouched by DEC-1). The new
      attachment-dedup test run-2 exercises the GH-76 "replace" path: `uploadAssets`
      skips a deduped attachment via `continue` BEFORE recording its hash, so the
      updated lock binding's `attachmentHashes` becomes `{}` (push-flow.ts:766
      replaces with the current run's set). A subsequent third unchanged sync would
      see source assets but an empty `attachmentHashes` binding and spuriously
      classify LOCAL_AHEAD. GH-81 does not test a run-3, so the bug is not surfaced
      here, and fixing it is correctly out of scope (RSK-5: escalate to PM).
    suggestion: >
      Note this latent behavior in the PR description for human awareness (GH-81's
      new test directly exercises the path that produces the empty binding), and
      recommend triaging a follow-up change for the GH-76 replace semantics. No
      GH-81 code change required.
