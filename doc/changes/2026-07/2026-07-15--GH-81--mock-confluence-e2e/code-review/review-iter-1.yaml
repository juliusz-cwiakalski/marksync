    location: tests/e2e-mock/create-flow.test.ts:128-137
    message: >
      AC-4 requires AC-F2-1 (create-flow / TC-E2EMOCK-002) to fail if the GH-71
      `{ results: [...] }` attachment-unwrap regression is reintroduced ("the run-1
      real upload exercises the unwrap"). But create-flow performs 0 attachment
      uploads — the create-flow fixtures (page1/page2/page3) carry no real image
      asset and Mermaid is rendered as `code`, so `mapCreate`'s unwrap branch is
      never hit. The test asserts `postAttachments.length === 0` and contains dead,
      self-contradicting comments ("The GH-71 unwrap is tested in
      attachment-dedup.test.ts instead"). The GH-71 lock is actually held by
      TC-E2EMOCK-005 run-1, not TC-002 as documented in the spec §5.1 F-4 / test-plan
      TC-002 steps 5-6 / AC-4. This means AC-4's literal claim ("AC-F2-1 fails") is
      false and creates a maintenance trap: if a maintainer deletes/weakens
      attachment-dedup.test.ts believing GH-71 is covered by create-flow, the
      regression lock is silently lost. The suite-wide safety goal IS still met
      (TC-005 run-1 catches the regression), but the documented coverage map is wrong.
    suggestion: >
      Pick one: (a) PREFERRED — add a real image asset to the create-flow corpus
      (the attachment-dedup test already proves image uploads work in this tier) so
      TC-002 performs >=1 real upload and assert the attachment id is read from
      `results[0].id`, matching test-plan TC-002 steps 5-6 and making AC-4 literally
      true; OR (b) correct spec §5.1 F-4, test-plan TC-002, and AC-4's parenthetical
      to attribute the GH-71 unwrap lock to TC-E2EMOCK-005 run-1 and drop the
      "AC-F2-1 fails" claim. Option (a) is stronger because it also restores the
      multi-page + multi-asset coverage TC-002 was designed for.
