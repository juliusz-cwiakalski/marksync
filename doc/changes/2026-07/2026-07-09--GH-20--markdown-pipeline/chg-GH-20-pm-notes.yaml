decisions:
  - text: >
      PM-DEC-1 (sub/sup scope, DoR iter-1): remark-gfm cannot produce <sub>/<sup>
      (non-GFM syntax ~text~/^text^); the spike kitchensink that listed them was
      HAND-AUTHORED Storage XML, not markdown-generated. Decision: the visitor
      handles <sub>/<sup> HAST nodes DEFENSIVELY (renders correctly if a future
      extension/raw-HTML produces them) but they are EXCLUDED from the golden
      Markdown fixture set (unreachable from plain remark-gfm). Fidelity bar
      re-baselined to the actual remark-gfm-reachable constructs (~25). Spike
      proved sub/sup survive Storage round-trip when present in XML — preserved
      by the defensive visitor. PM-decided (technical-scope clarification, not
      product direction; reversible; documented as spec DEC).
    date: 2026-07-09
  - text: >
      PM-DEC-2 (ParseError, DoR iter-1): architecture-overview.md:219 documents
      the parse port as '-> MdastRoot | ParseError' but ParseError does not exist
      in MarkSyncError and NG-7 forbids adding kinds. remark-gfm is effectively
      total (very tolerant; produces best-effort MDAST). Decision: keep the
      Result<MdastRoot, MarkSyncError> signature for port-contract alignment but
      treat parseMarkdown as total in MS-0002 — a genuine parse failure is an
      invariant violation -> throw (per typescript.md error handling). Do NOT
      overload UnsupportedConstruct. Flag architecture-overview:219 for phase-7
      doc-sync. PM-decided.
    date: 2026-07-09

