notes:
  - text: >
      DoR iter-1 NOT_READY (2026-07-13): 2 blocking findings. (1) Spec AC-2
      silently narrowed the ticket's "mermaid SVG rendering works end-to-end"
      AC to just "upload succeeds" — no traceability bridge explaining that
      upload-unblock + unchanged GH-69 pipeline = E2E rendering restored.
      (2) Empty results array edge case ({ results: [] } → results[0] undefined
      under noUncheckedIndexedAccess → safeParse(undefined) fails) had zero test
      coverage despite the plan acknowledging the undefined case. Reopened
      specification + test_planning. Applying surgical fixes then re-running DoR.
    type: retro
    workItemRef: GH-71
    date: "2026-07-13"
  - text: >
      Intake (2026-07-13): P0 bug. mapCreate in src/infra/confluence/attachments.ts
      parses the POST attachment-create response as a flat AttachmentCreateResponse
      ({ id, title, ... }) but the v1 API returns { results: [{ id, title, ... }] }
      (confirmed by spike evidence doc/inception/integration-scenarios/11-attachments.md:37,
      F-01-upload.json). list() handles this correctly (AttachmentListResponse +
      parsed.data.results); mapCreate does not unwrap. This blocks GH-69 (mermaid
      render) SVG attachment upload end-to-end. Fix is precise in the ticket:
      unwrap body.results[0] before schema validation. Also: NO test covers the
      happy-path create (only 400-dup + list/exists paths are tested) — the bug
      went undetected because mapCreate's success path was never exercised.
  - text: >
      Retro — test-coverage gap allowed a P0 to ship. mapCreate (the v1 attachment
      CREATE success-path mapper) had ZERO unit coverage: every attachment test
      either hit the 400-dup path (TC-DUP-001/002) or list/exists (which use the
      correct AttachmentListResponse unwrap). The GH-21 test plan enumerated
      TC-ATTACH-001 (upload success) but it was never implemented. A single
      happy-path create test against the spike-evidence response shape (F-01:
      { results: [{ id, title, version }] }) would have caught this at GH-21 time.
      Process improvement: every adapter response mapper must have at least one
      test that uses the verbatim spike-evidence response body.
    type: retro
    workItemRef: GH-71
    date: "2026-07-13"
