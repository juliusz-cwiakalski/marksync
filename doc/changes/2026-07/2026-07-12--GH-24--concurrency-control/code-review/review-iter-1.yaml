summary: >
  The three pure domain gates (assertOperationFresh, assertPlanNotExpired,
  decideOnConflict) and the UUID-v7 timestamp extractor are correctly implemented
  with full unit-test coverage, and the applyPlan/processEntry wiring correctly
  enforces the 409 re-fetch-once discipline with per-document isolation. The
  TargetSystem port is unchanged, StalePlan is reused with no new error kinds,
  and bun run check passes (936 tests, depcruise clean). However, ALL planned
  integration tests are missing — Phase 3 Task 3.5/3.6 are marked done but
  tests/integration/app/concurrency-control-overlap.test.ts, 409-retry-policy.test.ts,
  concurrency-isolation.test.ts do not exist, and secrets-safety-integration.test.ts
  was not extended. This leaves five "Must" acceptance criteria (AC-F1-1, AC-F1-2,
  AC-F3-2, AC-F4-1, AC-F6-1) unverified at the integration level — the wiring
  through applyPlan is the highest-risk component and is exercised only by pure-function
  unit tests, not end-to-end. Remediation requires writing the three integration
  test files and extending the secrets-safety test before this change is PR-ready.
