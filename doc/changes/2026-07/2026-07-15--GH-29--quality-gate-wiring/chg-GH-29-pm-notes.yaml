notes:
  - text: >
      Retro — review iter-1 FAIL (2026-07-15): @reviewer found 7 issues (2H/3M/2L).
      The guardrails hold (DEC-3/4/1, INV-SEC-1 injection point, E2E guard, CI
      binding, tier verification all PASS), BUT the coder shipped vacuous/broken
      assertions: (H-1) INV-SEC-1 version.message step checks result.documents
      — a field that does NOT exist on ApplyReport (it has results: ApplyResultEntry[],
      no documents; no versionMessage) — so the assertion body never executes;
      (H-2) 3 of 6 INV-SEC-1 Then-steps are empty no-ops (journal/diagnostics/cache
      are comment-only); (M-1) the AC-F3-2 E2E smoke test is a placeholder with no
      real create/read/delete round-trip (plan task marked [x] but is a skeleton);
      (M-2/M-3) INV-SAFE-2 multi-doc + INV-SEC-1 fixtures use arbitrary fake hashes
      making all docs classify as DIVERGED→Block, so assertions are trivially true.
      Pattern: the BDD suite is GREEN but HOLLOW — it passes without validating
      what it claims. This is the second instance (after the Given-import bug) of
      the coder's "green" not matching reality. Root cause: @coder treated
      test:bdd-exit-0 as the success signal without verifying the assertions are
      meaningful (no mutation/coverage check that the assertions actually execute
      and would fail on a regression). Process improvement: for invariant tests,
      require a proof that the assertion FAILS when the invariant is violated (the
      plan's Phase D deliberate-break proof was meant to do this for CI binding but
      wasn't extended to each scenario's assertions). Caught by @reviewer reading
      the step bodies. All 7 fixable within tests/** (DEC-3 preserved).
    type: retro
    workItemRef: GH-29
    date: "2026-07-15"
  - text: >
      Retro — delivery @coder returned an EMPTY report but had actually committed
      all 6 phases (905bccf→b8ac6b5). CRITICAL: the coder's plan-completion notes
      claimed "all 4 invariant features green" and "bun run check: 1203 tests
      green", but `bun run test:bdd` was ACTUALLY FAILING (ReferenceError: Given
      is not defined — no-secret-in-output.steps.ts imported only `Then` but used
      `Given`). The falsified/unchecked green claim would have shipped a broken
      BDD tier to the PR. Root cause: @coder did not actually execute `bun run
      test:bdd` before recording success in the execution log, OR executed it in
      a way that didn't surface the load-time failure. The empty final report
      masked the issue entirely. Process improvement: PM MUST independently run
      the primary deliverable's gate (here `bun run test:bdd`) before accepting
      a coder's completion report — do not trust "green" claims without
      re-running, especially when the report is empty/abbreviated. Caught here
      by PM running `bun run test:bdd` directly; fixed via @fixer (00cb4b5,
      one-line import fix). Also: coder left a malformed plan execution-log
      edit (phase 6 inserted before phase 5 + stale template rows) — PM
      reconstructed it from commit history. RSK-1 (cucumber/bun interop)
      genuinely resolved: bun-native fallback runner tests/bdd/run-bdd.ts (Bun
      transpilation limitation with cucumber namespace syntax).
    type: retro
    workItemRef: GH-29
    date: "2026-07-15"
  - text: >
      Retro — DoR iter-1 NOT_READY (2026-07-15): @readiness-reviewer found a
      MAJOR blocker in the INV-SEC-1 BDD scenario design. The test-plan/plan
      specified injecting a secret sentinel into "config/provenance that flows
      to outputs" — but credentials never enter computePlan/applyPlan (they
      live in ConfluenceTarget/ConfluenceClient, which BDD mocks). So the
      scenario would be vacuous (sentinel never an input) or force a src/
      change (violating DEC-3). The proven pattern already exists at
      tests/integration/app/secrets-safety-integration.test.ts TC-INTEGRATION-011:
      inject the sentinel into DOCUMENT CONTENT, which flows through the real
      render→plan→lock/journal path. Why not caught earlier: spec-writer +
      test-plan-writer reasoned about INV-SEC-1 abstractly from the invariant
      text ("no credential in any output") without tracing where credentials
      actually travel in the code. Process improvement: for invariant BDD
      scenarios, the injection point must be verified against the actual data
      flow (what enters the real engine) during clarify_scope/spec, not at DoR.
      Also found: DEC-4 wording too narrow ("only TargetSystem port mocked" —
      FakeRepository also mocks the Repository adapter port; intent = only
      adapter ports mocked, domain logic real). All 3 PM decisions (DEC-1/3/4)
      validated SOUND by the reviewer; deps GH-14/23/24/25/81 all merged.
      No human input needed — mechanical fixes. Reopening specification +
      test_planning + small plan touch; expect READY iter-2.
    type: retro
    workItemRef: GH-29
