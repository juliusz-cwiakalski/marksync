decisions:
  - text: >
      BDD tier scoped to the 4 release-blocking INV invariants only
      (INV-SAFE-1 no-silent-overwrite, INV-SAFE-2 no-silent-recreate-remote-missing,
      INV-SAFE-3 duplicate-uuid-fatal [feature already exists], INV-SEC-1
      no-secret-in-output). The story's AC#1 also lists NFR-PERF-4 (idempotent
      rerun) and NFR-REL-5 (overlapping-plans-older-loses) as additive BDD
      scenarios, but the story scope-note explicitly permits moving them to the
      integration tier ("either way they remain gated"), and testing-strategy.md
      (current-truth, last_updated 2026-07-15) scopes BDD to "lifecycle
      invariants only" with NFR-PERF-4 listed under Integration. Verified both
      are ALREADY covered in the integration tier:
      tests/integration/app/idempotency.test.ts (NFR-PERF-4),
      tests/integration/app/concurrency-control-overlap.test.ts +
      concurrency-isolation.test.ts (NFR-REL-5). Choosing the 4-invariant path
      avoids duplication and stays literal to TDR-0007/testing-strategy.
