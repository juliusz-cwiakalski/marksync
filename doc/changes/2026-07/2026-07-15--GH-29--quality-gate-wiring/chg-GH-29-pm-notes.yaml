notes:
  - text: >
      Retro — DoR iter-1 NOT_READY (2026-07-15): @readiness-reviewer found a
      MAJOR blocker in the INV-SEC-1 BDD scenario design. The test-plan/plan
      specified injecting a secret sentinel into "config/provenance that flows
      to outputs" — but credentials never enter computePlan/applyPlan (they
      live in ConfluenceTarget/ConfluenceClient, which BDD mocks). So the
      scenario would be vacuous (sentinel never an input) or force a src/
      change (violating DEC-3). The proven pattern already exists at
      tests/integration/app/secrets-safety-integration.test.ts TC-INTEGRATION-011:
      inject the sentinel into DOCUMENT CONTENT, which flows through the real
      render→plan→lock/journal path. Why not caught earlier: spec-writer +
      test-plan-writer reasoned about INV-SEC-1 abstractly from the invariant
      text ("no credential in any output") without tracing where credentials
      actually travel in the code. Process improvement: for invariant BDD
      scenarios, the injection point must be verified against the actual data
      flow (what enters the real engine) during clarify_scope/spec, not at DoR.
      Also found: DEC-4 wording too narrow ("only TargetSystem port mocked" —
      FakeRepository also mocks the Repository adapter port; intent = only
      adapter ports mocked, domain logic real). All 3 PM decisions (DEC-1/3/4)
      validated SOUND by the reviewer; deps GH-14/23/24/25/81 all merged.
      No human input needed — mechanical fixes. Reopening specification +
      test_planning + small plan touch; expect READY iter-2.
    type: retro
    workItemRef: GH-29
    date: "2026-07-15"
  - text: >
      Intake assessment (tier-by-tier state on main):
      1. Unit — WIRED (tests/unit/ populated, in CI fast-loop).
      2. Integration (mocked Confluence) — WIRED (tests/integration/ populated,
         in CI fast-loop; Bun.serve mock + FakeTarget).
      3. Golden fixtures — WIRED (tests/golden/ snapshots + markdown, in CI
         fast-loop; --update-snapshots explicit, never in CI).
      4. Mermaid-DOM (happy-dom) — WIRED (tests/mermaid.preload.ts registered
         in bunfig.toml [test].preload; GH-25/E4-S1 populated it).
      5. Gherkin BDD — GAP. @cucumber/cucumber NOT installed; package.json
         test:bdd is a no-op stub; only tests/bdd/features/duplicate-uuid-fatal.feature
         (INV-SAFE-3) exists; NO step definitions.
      6. E2E (live-sandbox) — GAP. tests/e2e/ EMPTY (.gitkeep only);
         .github/workflows/run-e2e.yml EXISTS and is correct (schedule + label +
         workflow_dispatch; concurrency group e2e-sandbox; secrets wired). Needs
         a thin runner + guarded smoke test that skips when MARKSYNC_E2E_*
         secrets absent + cleanup.
      (+) E2E (mock) — WIRED by GH-81 (tests/e2e-mock/, separate ci.yml job,
         secrets-free). This is the 7th tier added after the story was written;
         testing-strategy.md already documents it.
      CI fast-loop wiring (ci.yml): lint, commitlint, typecheck, test
      (unit+integration+golden --coverage), check:boundaries, test:bdd (currently
      no-op), e2e-mock job, dependency-audit, osv-scan, doc-yaml-lint+link-check
      — all present. coverage gate in bunfig.toml (lines 0.70 / functions 0.80,
      already adjusted per OQ-1).
      Net: change is BDD wiring + E2E harness wiring + make test:bdd binding.
      No src/ domain logic changes expected (pure test/CI infra).
