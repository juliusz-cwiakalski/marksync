notes:
  - text: >
      PM sign-off (Finding 5): stale parked-plan expiry advisory deferred as
      NG-5 — confirmed correct for MS-0002 (computePlan is pure/ephemeral,
      not persisted to disk; no parked plan to expire). Owner-approved;
      captured here per DoR reviewer request. No spec change needed beyond
      this record.
    type: decision
    date: "2026-07-15"
  - text: >
      Retro — DoR iter-1 (2026-07-15): readiness-reviewer caught a BLOCKER
      the three authors all missed. Root cause: spec-writer + plan-writer +
      test-plan-writer all reasoned about the crash-window (journal-ahead-of-
      lock) as the primary interruption scenario, but the EXISTING crashAfter
      test hook throws POST-transaction (after processEntry returns, i.e.
      after saveLock+putProperty). So crashAfter reproduces "K committed, N-K
      unstarted" not "K journaled, lock missing K." The two-stage plan's
      Stage-2 gate (crash-window candidate exists) was therefore always FALSE
      for the crashAfter scenario → remaining docs never completed → AC-F2-1
      (the premortem §14 beachhead, release-blocking) fails. KEY PROCESS
      INSIGHT: the DoR gate's adversarial code-verification (the reviewer
      actually read push-flow.ts lines 870-873 and crash-replay.test.ts
      241-254) caught what sequential authoring could not. LESSON: when a plan
      depends on the semantics of an existing test hook or write-path
      ordering, that dependency must be VERIFIED against source during
      planning, not assumed. Remediation: reopen specification (clarify
      crashAfter=post-transaction; crash-window is a separate rarer scenario
      needing a manual fixture) → delivery_planning (redefine Stage-2 trigger
      on journal-exists not crash-window-candidate) → test_planning (add
      journal-ahead-of-lock fixture + fix divergence body-change + extend
      FakeTarget.searchPages). All primitives verified TRUE by reviewer.
    type: retro
    date: "2026-07-15"
  - text: >
      Retro — delivery (2026-07-15): coder completed Phases 1-3+7 (impl +
      version bump) but SKIPPED Phases 4-5 (the 13 TC-REPAIR test cases)
      citing "time constraints." Only existing tests passed; zero AC-
      coverage tests written. Had to re-invoke coder to write the tests,
      then fixer to resolve 7 integration failures. Root causes of the 7
      failures were structural bugs in runRepair (Stage-1/2 logic nested
      inside diagnose loop = unreachable; classify() called without local
      arg = always LOCAL_MISSING = divergence undetected = INV-SAFE-1
      violation; missing-property checked before missing-page; R1 fallback
      unreachable when lock empty) + one test fixture bug (invalid UUID
      format). LESSON 1: coder must complete ALL plan phases including
      tests — skipping tests and leaving AC coverage unverified is a DoD
      blocker that costs a round-trip. LESSON 2: the runRepair structural
      bugs (unreachable code, missing divergence detection) were exactly
      what the integration tests exist to catch — confirming the test
      plan's value. INV-SAFE-1 gap (TC-011) was a real safety bug the
      tests surfaced. Fixer's full rewrite of runRepair resolved all 7;
      reviewer must examine the final implementation carefully.
    type: retro
    date: "2026-07-15"
  - text: >
      Retro — review iter-1 (2026-07-15): reviewer found a HIGH safety bug
      (F-1) the coder + fixer both missed: the dirty-lock rebuild path and
      crash-window candidate path rebuild a binding UNCONDITIONALLY without
      a divergence check. The fixer had added a divergence check, but only
      to the reconcile-OK branch (consistent lock) — NOT to the LockDirty
      or crash-window branches. So a diverged remote + stale lock would be
      silently "repaired" (the diverged remoteBodyHash baked into the
      binding → next sync sees no remote drift → silent overwrite = data
      loss). This is an INV-SAFE-1 violation in exactly the scenario the
      spec F-5/DEC-4/AC-F5-1 target. LESSON: the fixer's full rewrite of
      runRepair fixed the 7 structural test failures but introduced/
      left a safety gap because it was tested only via the reconcile-OK
      divergence path (TC-011), not the dirty-lock+divergence combination.
      When a safety invariant (INV-SAFE-1) has multiple code paths, EACH
      path needs its own divergence gate + test. The reviewer's per-path
      audit caught this. Remediation: add divergence check to all rebuild
      paths + a dedicated dirty-lock+diverged-remote integration test.
    type: retro
    date: "2026-07-15"
  - text: >
      Intake context: repair-state currently a STUB (src/cli/commands/
      repair-state.ts → err INTERNAL "not yet implemented MS2-E3"). All
      domain primitives exist: reconcileWithProperty +
      rebuildLockFromConfluence (src/domain/state/reconcile.ts, GH-19),
      replayJournal/openJournal (src/app/journal.ts, GH-23). This story =
      orchestration + UX + diagnostics. applyPlan journals BEFORE lock save
      per-doc (finalizeSuccessfulUpdate), so crash window = journaled-but-
      not-locked; repair-state closes it by rebuilding from remote for those
      ops (no duplicate writes — AC#1). Dry-run default; --apply executes.
      Likely app-tier src/app/repair.ts + thin CLI handler (sync.ts pattern).
    type: info
    date: "2026-07-15"
