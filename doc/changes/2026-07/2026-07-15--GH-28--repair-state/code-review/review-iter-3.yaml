findings:
  - id: F-1
    severity: info
    confidence: high
    category: correctness
    location: src/app/repair.ts:416
    message: >
      Non-blocking observation (accepted): the crash-window divergence check
      compares rawHash(page.body) [post-normalization] against
      property.renderedBodyHash [pre-normalization canonical hash]. This is the
      same pre/post mismatch documented as the rationale for NOT adding a check
      to the journal-lost path (F-3). A conservative false positive is
      theoretically possible if Confluence normalizes the body after a
      successful sync, causing NEEDS_HUMAN_ACTION_DIVERGED for a non-diverged
      page. This errs on the SAFE side (blocks a rebuild rather than silently
      overwriting) and no post-normalization reference hash is available in the
      crash-window scenario (the binding is absent from the lock). Consistent
      with the reviewer-requested check from iteration 1. No action required.
    suggestion: >
      If false-positive reports surface in production, consider storing
      remoteBodyHash (post-normalization) in the MetadataProperty alongside
      renderedBodyHash so the crash-window path has a reliable comparison
      baseline. Low priority — safe-direction behavior today.
    suppressed: true
