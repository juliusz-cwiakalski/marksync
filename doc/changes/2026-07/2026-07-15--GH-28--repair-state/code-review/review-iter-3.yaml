      loop is skipped → line 355 `latestJournalRunId && crashWindowCandidates
      .size > 0` is true → replays journal → property parsed → getPage returns
      diverged body → line 416 rawHash(page.body) !== property.renderedBodyHash
      → NEEDS_HUMAN_ACTION_DIVERGED pushed + continue (no rebuild). Assertions:
      ok=true, getWriteCount()=0, items length 1, diagnosticClass
      needs-human-action, diagnosticCode NEEDS_HUMAN_ACTION_DIVERGED, lock
      documents still {}. Genuinely exercises lines 414-426.
  - iter2_id: F-3
    status: RESOLVED
    verification: >
      Comment at repair.ts:163-167 documents the accepted-risk: property
      .renderedBodyHash is pre-normalization (what MarkSync sent), page.body is
      post-normalization (what Confluence stored), so a divergence check would
      false-positive; last-resort fallback, next sync catches genuine drift;
      references ADR-0005 fetch-back pattern. Verified technically sound:
      bindingToProperty (push-flow.ts:578) copies binding.renderedBodyHash
      (=entry.hashes.canonicalHash, pre-normalization) into the property; the
      property does NOT carry remoteBodyHash (the post-normalization fetched-
      back hash). So the journal-lost path has no reliable post-normalization
      reference — declining the check is the correct call.
