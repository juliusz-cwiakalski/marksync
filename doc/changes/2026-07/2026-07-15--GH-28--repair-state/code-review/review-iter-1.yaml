findings:
  - id: F-1
    severity: high
    confidence: high
    category: correctness
    location: src/app/repair.ts:308-329
    message: >
      Dirty-lock rebuild path lacks a divergence check (INV-SAFE-1 gap). When
      reconcileWithProperty returns LockDirty (sourceCommit mismatch), the code
      unconditionally marks the binding as "repaired" and adds it to rebuilds
      WITHOUT checking if the remote page body has diverged from what MarkSync
      last wrote. A diverged remote in a dirty-lock scenario is silently
      "repaired" — the rebuilt binding records the diverged remoteBodyHash, so
      on the next sync classify() sees remoteChanged=false and the divergence
      is permanently hidden (or, if local content also changed, the sync
      overwrites the user's remote edit = data loss). The same gap exists in
      the crash-window candidate rebuild path (lines 393-408). The fixer's
      INV-SAFE-1 fix (commit 1cf0a4d) only added the divergence check to the
      reconcile-ok branch (lines 281-291); the dirty-lock branch was left
      unchecked. The plan task 2.2 explicitly required calling classify() for
      dirty bindings before rebuilding.
    suggestion: >
      Before adding a dirty-lock binding to rebuilds, check whether the remote
      body has diverged. Compare rawHash(page.body) against a reference of what
      MarkSync last wrote (e.g. property.renderedBodyHash, or construct a
      SharedBase + RemoteState and call classify()). If the remote diverged
      (REMOTE_AHEAD/DIVERGED), emit NEEDS_HUMAN_ACTION_DIVERGED with 0 writes
      and skip the rebuild. Apply the same check to the crash-window candidate
      path (lines 393-408). Add an integration test: dirty lock
      (sourceCommit mismatch) + diverged remote body → assert
      needs-human-action + 0 writes.
    suppressed: false
    published_url: null
    published_at: null
    published_comment_id: null
    published_thread_id: null
  - id: F-2
    severity: medium
    confidence: high
    category: correctness
    location: src/app/repair.ts:224-330,445-486
    message: >
      Contradictory report items in the interrupted-apply scenario. When a
      crashed run left some docs unwritten (no marksync.metadata property on
      the remote), the diagnose stage emits NEEDS_HUMAN_ACTION_MISSING_PROPERTY
      for those docs, but Stage 2's applyPlan subsequently writes them and
      appends a "repaired" item. The same document UUID thus appears twice with
      contradictory diagnostics (needs-human-action + repaired). TC-REPAIR-007
      and TC-REPAIR-008 mask this by using toBeGreaterThanOrEqual instead of
      exact counts and not checking for duplicate UUIDs.
    suggestion: >
      Either (a) skip the diagnose-stage property check for docs that Stage 2
      will handle (since applyPlan will set the property), or (b) deduplicate
      items by UUID after both stages complete (Stage 2 results override
      diagnose-stage items for the same UUID), or (c) tighten the diagnose
      logic to only emit needs-human-action for docs that are NOT going to be
      completed by Stage 2. Also tighten TC-REPAIR-007/008 assertions to exact
      item counts and verify no duplicate UUIDs appear in report.items.
    suppressed: false
    published_url: null
    published_at: null
    published_comment_id: null
    published_thread_id: null
