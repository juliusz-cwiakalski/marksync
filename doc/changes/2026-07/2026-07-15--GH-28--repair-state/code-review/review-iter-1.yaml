summary: >
  The GH-28 repair-state delivery is architecturally sound: clean DEC-1 tier
  separation, correct dry-run/apply semantics, a well-structured RepairReport
  with stable diagnostic codes, working Stage-1 (rebuild-from-remote) and
  Stage-2 (idempotent completion) flows, and 19 passing tests covering 13 TCs.
  All primitives (push-flow, reconcile, classifier, journal) are untouched.
  However, the INV-SAFE-1 divergence gate is INCOMPLETE: the fixer's fix
  (commit 1cf0a4d) added a divergence check only to the reconcile-ok branch
  (consistent lock), but the dirty-lock rebuild path (lines 308-329) and the
  crash-window candidate path (lines 393-408) rebuild unconditionally WITHOUT
  checking whether the remote body has diverged. A diverged remote in a
  dirty-lock scenario is silently reported as "repaired" rather than
  needs-human-action, violating F-5 / DEC-4 / AC-F5-1. This is the review's
  sole blocking concern and requires remediation before proceeding.
