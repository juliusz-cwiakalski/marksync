  divergence only. Additionally, a pre-existing INFO-level gap remains: the
  4th rebuild path (journal-lost + lock-gone, lines 196-222) lacks a divergence
  check. The format fix is trivial; the change is otherwise sound and ready for
  quality gates once formatting is corrected and the missing test is added.
