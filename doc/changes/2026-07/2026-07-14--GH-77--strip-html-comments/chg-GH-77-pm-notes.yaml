notes:
  - text: >
      Intake: generic bug (no [MS2-Exx-Sxx] title prefix -> no story file);
      ticket body authoritative. Code cross-check confirms ticket exactly:
      (1) unsupported.ts:90-96 returns raw-html-block UnsupportedConstruct for
      any raw node that is a direct child of root -> block comment aborts sync;
      (2) storage.ts:73 visitChild escapeTexts inline raw -> inline comment
      leaks as literal &lt;!-- --&gt;; (3) [//]: # parsed by remark as a
      definition node (no HAST output) -> already a no-op, confirm via golden.
      Default fix = strip comment raw nodes uniformly; non-comment raw HTML
      unchanged (DEC-4 escape for inline, F-5 UnsupportedConstruct for block).
      No blocking questions; Confluence-passthrough verification is optional
      (AC#7), strip is the safe fallback and the default path.
    type: info
    date: "2026-07-14"
  - text: >
      Doc impacts anticipated: doc/spec/features/feature-safe-publish.md
      (markdown pipeline section — comment stripping behavior + F-5 carve-out
      for non-rendering annotations); possibly feature-mermaid-rendering.md
      already strips SVG comments (§3.3 rule 1) as precedent. @doc-syncer to
      reconcile in phase 7. No contract/domain-model change expected.
    type: info
