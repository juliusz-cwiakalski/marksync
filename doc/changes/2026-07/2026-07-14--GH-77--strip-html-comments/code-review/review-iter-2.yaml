      `/^\s*<!--[^>]*>\s*$/` to `/^\s*<!--(?:[\s\S]*?-->|>|-?>)\s*$/`. Verified
      empirically: `<!-- a > b -->`, `<!-- a >= b -->`, `<!-- TODO: x > 0 -->`
      now return `true` (were `false`). All 13 false-cases (raw `<div>`, `<b>`,
