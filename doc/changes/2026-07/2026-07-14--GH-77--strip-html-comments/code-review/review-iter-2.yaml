summary: >
  Re-review after Phase F remediation (commit 20e82fd). The F-1 under-strip
  defect is genuinely closed: the predicate changed from `[^>]*` to the combined
  regex `/^\s*<!--(?:[\s\S]*?-->|>|-?>)\s*$/`, which was verified empirically
  across 26 cases — the previously-broken `<!-- a > b -->` and
  `<!-- TODO: x > 0 -->` forms now return `true`, while the security boundary
  (mixed HTML+comment nodes like `<div><!-- c --></div>` and pure raw HTML like
