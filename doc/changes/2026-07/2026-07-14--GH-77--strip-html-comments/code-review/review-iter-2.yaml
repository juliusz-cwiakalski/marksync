      `<!-->` / `<!--->` preserved via the `>|-?>` alternatives. No over-match
      hole: the `^\s*<!--` opener anchor rejects any node not beginning with a
      comment, and `\s*$` rejects trailing real HTML. ReDoS-safe (lazy
      `[\s\S]*?-->` terminated by a single literal; 170 KB adversarial input in
      1 ms).
