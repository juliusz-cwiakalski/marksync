findings:
  - id: F-1
    severity: high
    confidence: high
    category: correctness
    location: src/domain/markdown/strip-comments.ts:11
    message: >
      The predicate `isCommentOnlyHtml` uses the regex `/^\s*<!--[^>]*>\s*$/`.
      The `[^>]*` character class stops at the first `>`, so a valid HTML
      comment whose body contains a `>` (e.g. `<!-- a > b -->`,
      `<!-- TODO: x > 0 -->`) returns `false` and is NOT stripped. Empirically
      confirmed: remark parses such input as a single `html` node (verified via
      `remark().parse()`), so the comment survives the parse stage and the
      original GH-77 bug persists — block-level aborts sync with
      `UnsupportedConstruct: raw-html-block`; inline leaks as escaped literal
      text (`&lt;!-- a &gt; b --&gt;`). This deviates from the plan's documented
      predicate contract in Phase A.1 (`/^\s*<!--[\s\S]*?-->\s*$/`, which would
      handle `>` correctly) and leaves RSK-2 (under-strip) unmitigated for this
      form. The predicate is explicitly the "load-bearing security/correctness
      boundary" per the plan.
    suggestion: >
      Replace `[^>]*` with the plan-documented `[\s\S]*?`:
      `/^\s*<!--[\s\S]*?-->\s*$/`. Add a unit-true-case for `<!-- a > b -->`
      and an end-to-end assertion that a `>`-bearing block comment syncs
      (Result.ok, no leak) and a `>`-bearing inline comment does not appear in
      the body. Note: this changes behavior for the obscure HTML5 edge cases
      `<!-->` / `<!--->` (currently tested as `true`) — either drop those two
      test assertions or use a combined regex
      `/^\s*<!--(?:[\s\S]*?-->|>)\s*$/` to preserve them while fixing the
      `>`-in-body case.
