    location: tests/integration/markdown/pipeline-roundtrip.test.ts:35-36
    message: >
      The `roundtripFixtures` filter hardcodes error-fixture names
      (`f.name !== "raw-html-block-real" && f.name !== "mixed-html-comment"`)
      rather than detecting the `.unsupported.txt` sidecar the way the golden
      harness (`storage-renderer.test.ts` `loadFixtures()`) does. A future
      fixture that adds a `.unsupported.txt` sidecar would be picked up by the
      fixtures-dir loader, counted toward the `toBe(33)` total, but would cause
      `pipeline()` to throw inside the four success `for...of` loops with a
      confusing per-fixture error. The error-fixture knowledge is duplicated by
      name in two places.
    suggestion: >
      Derive the skip set from sidecar existence (e.g. read the fixtures dir
      once, partition into success vs. error fixtures by checking for
      `${name}.unsupported.txt`), so adding a new error fixture never silently
      breaks the round-trip success loops. Alternatively, expose an
      `isErrorFixture` flag from the loader and filter on it.
