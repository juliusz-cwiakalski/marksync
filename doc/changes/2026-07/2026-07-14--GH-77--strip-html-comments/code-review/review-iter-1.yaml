summary: >
  The implementation is structurally sound: the parse-stage strip is correctly
  wired (DEC-2), the DEC-4/F-5 infra files (unsupported.ts, canonicalize.ts,
  storage.ts) are untouched, the golden fixtures + error-case harness are well
  designed, the regression guards and idempotency tests are thorough, and all
  gates pass green (1184 tests, lint, format, typecheck, boundaries). However,
  the load-bearing predicate `isCommentOnlyHtml` uses `[^>]*` instead of the
  plan-documented `[\s\S]*?`, which causes valid HTML comments containing a `>`
  character (e.g. `<!-- a > b -->`) to be UNDER-STRIPPED — they are left in the
  tree and the original bug persists (block-level aborts sync, inline leaks as
  literal text). This was confirmed empirically: remark produces such comments
  as single `html` nodes and the predicate returns `false` for them. Two minor
  issues round out the iteration: the round-trip filter hardcodes error-fixture
  names instead of detecting the sidecar, and all plan task checkboxes remain
  unchecked despite every phase being COMPLETED.
