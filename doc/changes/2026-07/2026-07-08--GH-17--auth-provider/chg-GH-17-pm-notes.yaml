decisions:
  - text: "DEC-1 (injected fetch): validateCredentials accepts an injectable fetch-shaped fn defaulting to global fetch (resolveCredentials is pure env logic, no fetch param). Keeps src/app/credentials.ts importing #domain/* only (app-tier pure, unit-testable without Bun.serve). Resolved independently + identically by spec-writer AND plan-writer — strong coherence."
    date: "2026-07-08"
  - text: "DEC-2 (AuthError union shape): single new arm {kind:'Auth'; authKind:'MissingCredentials'|'InvalidBaseUrl'|'InvalidCredentials'|'AuthUnreachable'} mirroring the GH-15 InvalidConfig precedent (union 13→14, not 17). Resolved independently + identically by spec-writer AND plan-writer."
    date: "2026-07-08"
  - text: "PM-decided (stable error.code strings): endorse the spec's AUTH_-prefixed codes — AUTH_MISSING_CREDENTIALS, AUTH_INVALID_BASE_URL, AUTH_INVALID_CREDENTIALS, AUTH_UNREACHABLE — all → EXIT_AUTH (20); only AUTH_UNREACHABLE retryable. Plan-writer used unprefixed codes; spec is authoritative and the AUTH_ prefix aids operational grouping (grep). Test-plan pinned 'whatever is chosen' so this is non-breaking."
    date: "2026-07-08"
  - text: "PM-decided (v1 user/current fallback): DROP v1 fallback — v2 user/by-me is the sole validation endpoint for this story. Rationale: (1) MS-0002 MVP minimal surface; (2) v2 is the current documented endpoint; (3) story's '(or v1 user/current)' reads as an acceptable alternative, not a mandatory dual-path fallback; (4) one network call = fewer failure modes; (5) v1 fallback can be added later if a tenant lacks v2. Spec's RSK-6 'both paths tested' claim must be removed; plan's v1 deferral is correct."
    date: "2026-07-08"
