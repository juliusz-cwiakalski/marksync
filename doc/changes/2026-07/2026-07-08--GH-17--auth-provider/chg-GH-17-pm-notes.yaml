  - text: "Design point for spec/plan-writer (NOT a human blocker): AuthError has 4 sub-kinds (MissingCredentials, InvalidBaseUrl, InvalidCredentials, AuthUnreachable). Story says 'AuthError added to MarkSyncError (exhaustive union update)'. Two viable union shapes: (a) single arm {kind:'Auth'; ...sub} or (b) four separate arms. Also: validateCredentials does network I/O but story places file at src/app/credentials.ts — resolve via injected fetch to keep app-tier testable + dep-cruiser green. Both are in-scope technical decisions."
