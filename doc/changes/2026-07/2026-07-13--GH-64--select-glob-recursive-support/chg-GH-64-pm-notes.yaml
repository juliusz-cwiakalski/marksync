decisions:
  - text: >
      Fix approach = ticket option 1: list ALL committed files via
      `git ls-tree -r --name-only ref` (no pathspec), then filter in-memory
      with src/shared/glob.ts (filterByGlob/matchGlob, which support `**`).
      Rationale: glob.ts already implements correct micromatch-style `**`
      semantics used by selectFiles (app tier); reusing it keeps a single
      source of truth for glob matching. Option 2 (translate `**` to git
      pathspec) is rejected — git pathspec has no clean `**` equivalent and
      would duplicate matching logic.
    date: "2026-07-13"
  - text: >
      Security invariant preserved: validateRepoRelative(pattern) stays on
      each pattern even though patterns are no longer passed to git (they are
      consumed by the in-memory matcher). This keeps TC-INTEGRATION-009
      malicious-path fuzz test green (patterns still throw before any spawn).
      Glob chars `*` and `?` pass validateRepoRelative (only shell
      metacharacters / control bytes / `..` / absolute paths are rejected).
    date: "2026-07-13"

