  - text: >
      DoR iter-1 NOT_READY (2026-07-14): readiness-reviewer caught 2 critical
      + 5 major gaps. Root causes: (1) classifyVersion prefix in spec/test-plan
      used "marksync:" but actual PROVENANCE_PREFIX in provenance.ts is
      "marksync git" — would never classify a real version as marksync
      (NFR-REL-9 broken); (2) false-drift architecture contradiction — plan
      appends panel post-render (string, not HAST) but classifier compares
      HAST-canonical hashes, making the canonicalizer normalization dead code;
      spec's "panel in hash except excluded" claim is ambiguous. Plus: privacy
      NFR-PRIV-1 ID collision + incorrect claim that subjects never in
      version.message (ADR-0010 C-2 intentionally includes compact subject
      summary in version.message; privacy constraint is specifically about
      marksync.metadata property); lock-format contradiction (spec says "no
      changes" but plan extends lock-schema.json); config.visiblePanel wiring
      unspecified at apply point; ProvenanceInput missing sourcePath/
      synchronizedAt for the panel; no system-doc updates planned. Reopening
      specification + test_planning + delivery_planning. Process improvement:
      spec/plan authors should ground interface claims in actual source
      (prefix string, hashing layer) before asserting them — the prefix
      mismatch was a 1-line grep away.
    type: retro
    workItemRef: GH-27
    date: "2026-07-14"
