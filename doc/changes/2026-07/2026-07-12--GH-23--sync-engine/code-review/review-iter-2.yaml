findings:
  - id: F-1
    severity: high
    confidence: high
    category: correctness
    location: src/app/push-flow.ts:193-196,228,294,307,387
    message: >
      AC-F7-1 is STILL not met: the cross-page link resolver is wired in, but
      the wiring is in the wrong order. computePlan calls
      `target.renderBody(hast)` at line 193 and captures `body` at line 196
      (a string snapshot of the ORIGINAL HAST with literal `.md` hrefs). Only
      afterwards, at line 228, does `_resolveLinksInDoc(hast, ...)` mutate
      `el.properties.href` to the resolved page URL. Because `body` is already
      an immutable string, the mutation has zero effect on it. The entry stores
      `renderedBody: body` (lines 294/310) and `action.body: body` (line 307),
      and applyPlan publishes `entry.renderedBody` (line 623) /
      `action.body` (line 693) — all the pre-resolution literal `.md` hrefs. So
      resolved links are never rewritten in what Confluence actually receives;
      the F-5 capability's stated purpose ("so Confluence internal links work
      after sync") remains unmet, exactly as in iter-1. No test asserts the
      rewritten href appears in the published body, which is why the gate stays
      green despite the bug.
    suggestion: >
      Reorder so resolution precedes rendering+hashing: call
      `_resolveLinksInDoc(hast, ...)` (collecting warnings) FIRST, THEN
      `target.renderBody(hast)` so the body is serialized from the
      already-rewritten HAST, and build the content hash from the same
      post-resolution HAST (keeps body↔hash consistent). Add a unit/integration
      case that puts a managed `[x](other.md)` link in the source, runs
      computePlan, and asserts the captured `renderedBody`/create-request body
      contains the resolved `viewpage.action?pageId=<id>` (not `other.md`).
    suppressed: false
    published_url: null
  - id: F-2
    severity: medium
    confidence: high
    category: correctness
    location: src/app/push-flow.ts:228-233,382-383
    message: >
      The unresolved-link half of AC-F7-1 ("emits a warning and
      UnresolvedLink — no broken URL is emitted silently") is still not met.
      `_resolveLinksInDoc` collects `UnresolvedLink` errors into a local
      `warnings[]` and returns the first one as `Result.err(...)`, but computePlan
      receives it in an EMPTY if-block (lines 229-233 — comments only: "In a real
      implementation, these would be collected and reported"). The warning is
      never surfaced onto the Plan/CommandResult, and because the body is still
      the literal href (see F-1), a broken `.md` URL is published silently —
      precisely what AC-F7-1 forbids. `_resolveLinksInDoc` also returns only the
      first warning, silently dropping the rest.
    suggestion: >
      Thread the warnings out: have `_resolveLinksInDoc` return ALL unresolved
      links, accumulate them across docs, and attach them to the Plan (e.g. a
      `warnings: MarkSyncError[]` field) / CommandResult `warnings` so they are
      visible to operators and agents. At minimum, when combined with the F-1
      fix, ensure no plan with unresolved managed-`.md` links completes without a
      surfaced warning.
    suppressed: false
    published_url: null
  - id: F-3
    severity: medium
    confidence: high
    category: correctness
    location: src/app/push-flow.ts:461-489
    message: >
      AC-F6-1 / NFR-9 / PD-6: parentFirstOrder still does not implement real
      parent-first topological ordering. A cycle guard was added (throws on
      `processing.has(uuid)`), but the per-create edge-following loop body at
      lines 475-480 is EMPTY — it never maps a Create's parentId to another
      create's uuid and never calls `visit(parent)`, so it cannot reorder and
      the cycle guard can never fire in practice (no recursive visit → no
      re-entry). The CEO directive was explicit: "implement real parent-first
      topological ordering (parentFirstOrder must actually reorder, not stub)."
      The MS-0002 flat layout means no inter-document parent edges exist today,
      so the runtime result is vacuously correct, but the code is a misleading
      half-implementation. The accompanying test
      (tests/unit/app/parent-first.test.ts) still does NOT assert call ordering
      (`createCalls` is captured but never checked) and its comment still says
      "the parent-first ordering doesn't really apply" — so AC-F6-1's "reorders
      parent-first" is not demonstrably verified either way.
    suggestion: >
      Either (a) implement real edge-following: when a Create's parentId matches
      another Create's eventual pageId, recursively `visit(parentUuid)` before
      emitting, keep the cycle throw, and make the test assert the parent is
      called before the child (and add a cycle-throws case); or (b) if MS-0002
      is genuinely flat-under-configured-parent with no inter-page parent edges,
      replace the misleading empty-body stub with a clearly-justified stable
      passthrough, mark AC-F6-1 N/A-for-MS-0002 in the spec with justification,
      and fix the test to assert the documented passthrough behavior. Do not
      leave the empty loop that looks like logic.
    suppressed: false
    published_url: null
  - id: F-4
    severity: low
    confidence: medium
    category: reliability
    location: src/app/push-flow.ts:42-45
    message: >
      F-4 is functionally fixed (toolVersion now reads "0.4.0" from package.json
      instead of the hardcoded "1.0.0"), but the implementation reads
      `package.json` via `readFileSync(join(process.cwd(), "package.json"))` at
      MODULE LOAD time. This couples correctness to the process working
      directory and will throw synchronously at import if the CLI is ever
      launched from a directory without a package.json, crashing the whole
      process with an unhelpful ENOENT rather than a typed error. It is a side
      effect at import time.
    suggestion: >
      Prefer a build-time constant or Bun's JSON import
      (`import pkg from "../../package.json"`) resolved at bundle time, or read
      it lazily where toolVersion is actually produced. Remove the module-level
      readFileSync side effect.
    suppressed: false
    published_url: null
