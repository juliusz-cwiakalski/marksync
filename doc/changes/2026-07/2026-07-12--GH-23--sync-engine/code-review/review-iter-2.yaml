summary: >
  Phase 9 remediation resolved F-3 (spawnGit now throws → CLI maps to
  INTERNAL/exit 99, tests updated), F-5 (crashAfter counts only successful
  mutations), F-9 (transient-vs-block documented), F-12 (bare alphabet-soup tags
  removed), and the TargetConfig/fixtures/guards items (9.4-9.7). DM-8 stays
  intact and the gate is green. HOWEVER the two iter-1 blockers are NOT
  satisfactorily resolved. (1) F-1 / AC-F7-1: the link resolver IS now wired
  into computePlan, but it mutates the HAST AFTER target.renderBody already
  produced the `body` string — so href rewrites never reach the published
  `renderedBody`/`action.body`. Cross-page `.md` links still publish literally;
  the "so Confluence internal links work after sync" purpose is still unmet.
  Additionally the unresolved-link warning is computed then discarded (empty
  if-block), and the literal `.md` href still goes to Confluence — i.e. a broken
  URL IS emitted silently. (2) F-2 / AC-F6-1: a cycle guard now exists, but the
  edge-following loop body is EMPTY (no recursive visit(parent)), so it still
  does not reorder; the CEO directive "parentFirstOrder must actually reorder,
  not stub" is not satisfied, and the parent-first test still asserts no
  ordering. Status FAIL pending a real render-after-resolve fix for F-1 (AC-F7-1)
  plus the parent-first medium.
