    category: spec-compliance
    location: src/app/push-flow.ts:218-221,358-367
    message: >
      AC-F7-1 / F-5 (cross-page link resolver) is NOT wired into the engine.
      `resolveLink` is never imported or called in push-flow.ts; `_resolveLinksInDoc`
      is a no-op stub (returns void) and the line `void bindingsMap; void _resolveLinksInDoc;`
      explicitly discards both the bindings map and the helper. As a result cross-page
      `.md` links are never resolved to Confluence page references in the actual
      computePlan→applyPlan pipeline, so Confluence internal links between managed
      pages will not work after sync (hrefs publish as literal `other.md`). The
      resolver function itself works in its own unit test, but F-5's stated purpose
      ("so Confluence internal links work after sync") is unmet. The "no broken URL
      emitted silently" half is satisfied only vacuously (nothing is rewritten).
    suggestion: >
      Wire the resolver: walk the rendered HAST link nodes in computePlan, call
      `resolveLink` for each `.md` target against the bindings map, rewrite resolved
      hrefs to the target PageRef id, and collect `UnresolvedLink` entries as plan
      warnings (never abort). Alternatively, formally descope link-rewriting to a
      later story with an explicit acknowledgment that MS-0002 publishes literal
      `.md` hrefs, and update AC-F7-1 + the spec accordingly.
    suppressed: false
    published_url: null
  - id: F-2
    severity: high
