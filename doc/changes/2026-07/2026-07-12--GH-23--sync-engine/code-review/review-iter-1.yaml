summary: >
  The sync-engine safety core is solid and well-tested: computePlan is pure
  (0 writes), the duplicate-UUID fatal gate fires before render, branch-gate
  precedes discovery, INV-SAFE-1/2 blocks produce 0 writes with REAL classify,
  the 409 path surfaces as drift with exactly one updatePage (no retry),
  per-document isolation holds, idempotency yields writes===0, the journal
  appends before lock-update, and DM-8 holds (errors.ts + all GH-22 state
  modules unchanged; provenance uses the REAL formatVersionMessage). However
  two acceptance criteria are NOT demonstrably satisfied: AC-F7-1 (the link
  resolver is delivered as a pure function with unit tests but is never wired
  into computePlan — `_resolveLinksInDoc` is a no-op stub and the bindings map
  is discarded, so cross-page .md links are never resolved/rewritten in the
  pipeline) and AC-F6-1 (parent-first ordering is a non-functional stub whose
  test never asserts ordering or the cycle guard). Plus a PD-3 error-discipline
  divergence in shell-git, a wrong toolVersion, and several test-honesty gaps.
  Status FAIL pending remediation of F-1/F-2 (or formal descoping) plus the
  medium findings.
