    category: correctness
    location: src/app/push-flow.ts:395-451
    message: >
      AC-F6-1 / NFR-9 / PD-6 (parent-first topological ordering) is a
      non-functional stub. `parentFirstOrder` builds a `parentMap` and a
      `processing` cycle-set but the `visit` function's parent edge is commented
      out ("For now, skip parent resolution"), so it never follows parent
      dependencies, never reorders, and the cycle guard can never fire. The
      accompanying test (tests/unit/app/parent-first.test.ts) captures
      `createCalls` but never asserts the ordering, and its own comment admits
      "parent-first ordering doesn't really apply in the same way … validates the
      structure." AC-F6-1 is therefore not demonstrably satisfied, and PD-6's
      "cycle → throw" invariant is unimplemented and untested.
    suggestion: >
      Either (a) implement real parent-first: map each Create's `parentId` to the
      target create's uuid, topologically sort, throw on cycles, and assert
      call-order + a cycle-throws case in the test; or (b) if MS-0002 is genuinely
      flat-under-configured-parent (spec §7.2) with no inter-page parent edges,
      remove the misleading stub, replace it with a stable passthrough + a clear
      comment, and mark AC-F6-1 as N/A-for-MS-0002 with spec justification.
    suppressed: false
    published_url: null
  - id: F-3
    severity: high
    confidence: high
    category: correctness
    location: src/infra/git/shell-git.ts:137-160
    message: >
      PD-3 / plan task 1.3 explicitly require that a genuine git runtime failure
      (non-zero exit on pre-validated input) THROW as a host-invariant violation
      ("Non-zero git exit → throw (host invariant)"). Instead `spawnGit` returns
      `Result.err({ kind: "RemoteUnreachable", cause: ... })` for every non-zero
      exit, non-success spawn, and thrown exception. Using `RemoteUnreachable`
      for a LOCAL git failure is semantically wrong (git is not a remote; this
      arm is documented for network/transport failures to Confluence) and will
      map to a misleading exit code / retry hint for operators and agents. The
      malicious-path guards (`validateRef`/`validateRepoRelative`) DO throw
      correctly — the divergence is only the runtime-failure path. (Not a
      swallow — the error is surfaced via Result — but it contradicts the
      documented error discipline and misuses an error arm.)
    suggestion: >
      Make non-zero git exit / spawn failure `throw` (host invariant) per PD-3,
      keeping DM-8 intact (no new arm). If a typed channel is genuinely preferred,
      raise it with the spec-writer/PM as a PD-3 amendment rather than silently
      reusing `RemoteUnreachable`.
    suppressed: false
    published_url: null
  - id: F-4
    severity: medium
    confidence: high
    category: correctness
    location: src/app/push-flow.ts:668
    message: >
      `toolVersion: "1.0.0"` is hardcoded for newly-created bindings (with a
      `// TODO: from package`) while package.json declares version `0.4.0`. The
      recorded toolVersion in both the lock and the `marksync.metadata` property
      will therefore be wrong, undermining the provenance/metadata accuracy that
      NFR-REL-9 / reconcile rely on. `bindingToProperty` propagates
      `binding.toolVersion`, so updates inherit whatever stale value the binding
      already carries.
    suggestion: >
      Read the tool version from a single source (e.g. a `VERSION` constant
      derived from package.json at build time, or `import { version } from
      "package.json"`) and use it for both Create and the property. Avoid the
      magic string.
    suppressed: false
    published_url: null
  - id: F-5
    severity: medium
    confidence: high
    category: correctness
    location: src/app/push-flow.ts:479,509-513
    message: >
      The `crashAfter` hook increments `processed` for EVERY entry (noop/skip/
      block/update/create) and throws when `processed >= crashAfter`. PD-5
      specifies "throws after the K-th SUCCESSFUL mutation, AFTER the journal
      append." In a mixed plan (e.g. a Block or NoOp before the K-th write) the
      hook fires at the wrong point, so the crash-replay semantics diverge from
      the spec. The current crash-replay test passes only because all three
      entries are writes (processed==successful coincidentally).
    suggestion: >
      Increment the crash counter only on `created`/`updated` outcomes, then
      throw after the journal append, matching PD-5.
    suppressed: false
    published_url: null
