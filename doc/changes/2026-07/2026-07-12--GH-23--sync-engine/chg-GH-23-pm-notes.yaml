notes:
  - text: >
      Coverage-gap retro: `bun test` exited 1 (848 pass/0 fail) because 4 new
      GH-23 source files + 2 test helpers violated the per-file coverage
      threshold (lines >= 70%, functions >= 80%). config-lock-mappers.ts and
      ports.ts were NEW source files shipped WITHOUT unit tests; plan.ts/sync.ts
      CLI wiring was only exercised via the no-config error path; FakeTarget/
      FakeRepository helpers had interface-required methods no test called.
      Fix: 6 new test files across commits 722d407 + f9fe468. Why not caught
      earlier: the coder delivered source + integration tests but the unit-
      coverage obligation on new files wasn't explicitly tracked as a plan
      task; Bun's per-file threshold includes test-helper files (no exclusion).
      Process improvement: (1) plan-writer should add explicit "unit coverage
      for new src/ files" tasks; (2) test helpers with interface-required dead
      methods need companion unit tests from the start; (3) run full `bun test`
      (not just targeted files) as a delivery completion gate.
