decisions:
  - text: "Exit-code mapping tier placement (architecture tension resolved): the story file lists `src/cli/output/exit-codes.ts` to 'Map MarkSyncError.kind → exitCode', but .dependency-cruiser.cjs enforces `presentation-may-not-import-domain` (severity error) and MarkSyncError lives in src/domain/errors.ts. Resolution per the GH-15 init.ts precedent (which uses Result structurally 'without naming any domain type'): (a) the `MarkSyncError.kind → {error.code, exitCode}` translation MUST live in the application tier (src/app/), which is permitted to import domain; (b) exit-code numeric CONSTANTS may live in src/shared/ (zero tier deps) or src/cli/output/; (c) src/cli/output/ owns only the stable-string/code → process.exit() translation and never names MarkSyncError. Architecture rules (TDR-0006) are authoritative; the story's file-path hint is a planning approximation, not a contract."
    date: "2026-07-08"
  - text: "Cliffy dependency source = JSR (not npm). Re-verification (TDR-0002 AI-assistance disclosure anticipated this) found @cliffy/command and @cliffy/flags are NOT on npm (404) — c4spar/cliffy moved to JSR-only publishing (v1.2.1 on jsr.io, the exact version TDR-0002 selected). The npm package `cliffy` (v2.5.1) is a DIFFERENT project (a REPL tool) — NOT a substitute. Resolution: install via the JSR npm-proxy using `.npmrc` (`@jsr:registry=https://npm.jsr.io`) + `@jsr/cliffy__command` / `@jsr/cliffy__flags` package names. This is the same c4spar/cliffy 1.2.1 library TDR-0002 selected — only the resolution mechanism changed. Import path in code: `@jsr/cliffy__command`. Doc-sync needed (phase 7): update typescript.md allowed-deps list + TDR-0002 registry framing (assumed npm)."
    date: "2026-07-08"
  - text: "Bun runtime version skew fixed: local was 1.1.34 but engines.bun=1.2.23 and CI pins 1.2.23 (text bun.lock + --frozen-lockfile). 1.1.34 produced a binary bun.lockb (wrong format → CI would fail). `bun upgrade` → 1.3.14 (text lockfile format, superset of 1.2.23 capability). Regenerated text bun.lock cleanly (+20 lines, new deps). Flag for human: engines.bun may want bumping to ^1.3 or the local env should pin 1.2.23 to match CI exactly."
    date: "2026-07-08"

