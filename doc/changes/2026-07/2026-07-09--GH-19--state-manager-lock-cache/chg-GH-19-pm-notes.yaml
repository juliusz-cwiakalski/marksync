decisions:
  - text: >
      Lock-file structure = SINGLE committed `marksync.lock.yml` at repo root with a
      `targets:` map; each target holds a `documents:` block keyed by UUID v7, written
      line-oriented/UUID-ordered to be mergeable. Resolves ADR-0006 unresolved Q1.
      "Per-target" = per-target ORGANIZATION inside one committed file, not one file per
      target. Matches system spec §9.3 lock schema verbatim. Filename `.yml` (matches the
      `marksync.yml` config convention).
    date: 2026-07-09
  - text: >
      `CorruptLock` added as a new MarkSyncError kind (invalid version / missing field /
      unparseable). `LockDirty` and `ConcurrentWrite` already exist. Adding a kind
      triggers the documented "add a kind" procedure: update assertNeverMarkSyncError,
      cli-error-map.ts, exit-codes.ts CODE_TO_EXIT, DEC-2 table — all in this change.
    date: 2026-07-09
  - text: >
      `reconcileWithProperty` and `rebuildLockFromConfluence` are PURE functions over
      caller-supplied records (property + pageVersion + hashes passed IN). The actual
      content-property fetch lives in E3-S4. Keeps GH-19 dependency-free of network code.
    date: 2026-07-09
  - text: >
      Stale-plan window default 15 min via existing `sync.stalePlanMinutes` (already in
      config schema from GH-15). No new config field needed for the window itself.
    date: 2026-07-09
  - text: >
      Delivery mode for this change: PM authors the change documents (spec/test-plan/plan)
      DIRECTLY, not via @spec-writer/@test-plan-writer/@plan-writer subagents, because
      repeated subagent delegations were externally interrupted (3x) in this session —
      per the GH-13 precedent ("PM executes directly when subagents stall in this
      environment"). Source-code implementation still delegated to @coder. Documents are
      not source code, so this does not violate the PM no-source-code constraint.
    date: 2026-07-09

  - text: >
      DoR verdict READY (PM self-review; @readiness-reviewer subagent route unreliable
      in-session). All 8 story AC mapped to spec AC/test TC/plan phases; deps resolved;
      no blocking OQ. Decided to self-run DoR per GH-13 precedent.
    type: decision
    workItemRef: GH-19
    date: 2026-07-09

