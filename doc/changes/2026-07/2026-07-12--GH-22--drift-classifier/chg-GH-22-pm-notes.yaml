  - text: >
      Dependencies resolved: blocked_by MS2-E3-S1 (GH-18 MERGED c4b6648),
      MS2-E3-S2 (GH-19 MERGED d21320a), MS2-E3-S4 (GH-21 MERGED d53a8ff). Blocks
      MS2-E3-S6 (sync engine). All clear to deliver.
