      HAST edits). Major F-2: base-absent branch reuses err(Forbidden) with empty
      pageId (DEC-3 reserves Forbidden for 403) — fix: make base required, delete
      dead branch. Why this matters: this is the trust-wedge; tests that pass
      without proving the property are worse than no tests. Why DoR didn't catch
      it: DoR reviews spec/test-plan/plan (pre-code); the test-plan accurately
      DESCRIBED the fixtures, but the coder implemented them as hollow mocks —
      only code review catches the spec-vs-implementation gap. Process
      observation: coder took the mock-shortcut on the highest-risk test suite.
      Remediation Phase 6 (6.1-6.7) appended to plan; delegating to @coder, then
      re-review.
