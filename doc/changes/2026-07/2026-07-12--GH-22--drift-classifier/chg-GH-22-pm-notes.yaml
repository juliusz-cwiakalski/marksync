  - text: >
      @reviewer iter-1 FAIL (1 blocker + 1 major + 1 minor + 3 nits + 1 info).
      Blocker F-1: the false-positive suite is HOLLOW — TC-FALSEPOS-001..005 are
      byte-identical to TC-STATE-001 (all use mockContentHash with hardcoded
      canonicalHash), so they assert NO_CHANGE by construction, NEVER exercising
      GH-20 normalization. AC-F2-1/NFR-4/NFR-8 not genuinely met. TC-REALCHG same
