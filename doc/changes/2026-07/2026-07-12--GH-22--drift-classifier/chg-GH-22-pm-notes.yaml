decisions:
  - text: >
      Issue body wording "5-state drift classification" / "5 states correctly
      detected" is stale AND diverges in two further ways: it uses the name
      REMOTE_BEHIND (a stale alias for LOCAL_AHEAD) and omits LOCAL_MISSING
      entirely. The authoritative story file (MS2-E3-S5), Ubiquitous Language
      (ubiquitous-language.md §Sync State), feature spec
      (feature-safe-publish.md §3.1 + §5), and roadmap all define 6 states:
      NO_CHANGE, LOCAL_AHEAD, REMOTE_AHEAD, DIVERGED, REMOTE_MISSING,
      LOCAL_MISSING. Per pm-instructions ("Git files are authoritative for story
      scope; GitHub Issues are short summaries"), 6 states is canonical and
      REMOTE_BEHIND is a stale alias for LOCAL_AHEAD. Story Q1 explicitly
      confirms the enum stays at 6 (forbidden/403 is NOT a state). No human
      input needed — resolved by documented authority rule.
    date: "2026-07-12"
  - text: >
      Story CEO-resolved decisions adopted verbatim: R1 — the classifier compares
      title and parentPageId in addition to body hash (metadata drift with same
      body -> LOCAL_AHEAD); Q1 — forbidden (403) is an access condition, not a
      sync state (enum stays 6); E3-S6 warns+skips, classifier returns a
      Forbidden flag.
    date: "2026-07-12"
