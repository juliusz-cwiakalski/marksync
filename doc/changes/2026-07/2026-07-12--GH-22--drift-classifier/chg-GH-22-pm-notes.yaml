    workItemRef: GH-22
    date: "2026-07-12"
  - text: >
      Existing contracts the classifier must REUSE (no duplication):
      (1) src/domain/render/canonicalize.ts already owns canonicalize(hast) +
      contentHash(canonical) — its header says "The wire-format prefix is the
      consumer's concern (E3-S5)"; the new hashes.ts composes rawHash +
      canonicalHash (delegates to contentHash(canonicalize())) + attachmentHash.
      (2) PageBinding (src/domain/binding/page-binding.ts) already carries the
      base hashes: sourceContentHash (raw), renderedBodyHash (canonical),
      remoteBodyHash, attachmentHashes, plus pageId/parentPageId/pageVersion.
      (3) MarkSyncError already has RemoteMissing, Forbidden, Conflict arms —
      the classifier returns these via Result<SyncState, MarkSyncError>.
      (4) reconcile.ts is the existing state-module sibling (content-property
      cross-check) — classifier.ts/hashes.ts/actions.ts join it under
      src/domain/state/.
    type: info
    workItemRef: GH-22
    date: "2026-07-12"
  - text: >
      Design refinement for spec-writer to nail down (non-blocking, resolvable
      from story): the story's classify() signature shows local: ContentHash
      (required), but LOCAL_MISSING (AC + 6-state table) requires local to be
      ABSENT (binding in lock, source doc gone). So `local` must be optional or
      the input discriminated. Also base-absent case (new doc, no binding) is
      NOT one of the 6 states — engine handles create directly; classifier is
      only called for bound documents. The "both local+remote missing" edge
      needs an explicit classification. Surface these in the spec.
    type: info
    workItemRef: GH-22
    date: "2026-07-12"
  - text: >
      False-positive guard (NFR-REL-3 <5%) builds on GH-20's canonicalizer
      (structural whitespace dropped, properties sorted, raw->text). The
      classifier compares canonicalHash (not rawHash) so whitespace-only /
      attribute-order changes do NOT trigger false positives. rawHash is
      informational only. Spec must state this dependency explicitly.
    type: info
    workItemRef: GH-22
    date: "2026-07-12"
  - text: >
      Spec complete (chg-GH-22-spec.md, 436 lines). Key decisions captured by
      @spec-writer: DEC-1 local made OPTIONAL in classify() to express
      LOCAL_MISSING (resolves story's self-contradictory required-local
      signature); DEC-2 ContentHash.canonicalHash DELEGATES to GH-20
      contentHash(canonicalize()) — no re-implementation; DEC-3 NO new error
      arms — REMOTE_MISSING->Block(RemoteMissing), REMOTE_AHEAD/DIVERGED->
      Block(Conflict), forbidden->err(Forbidden) all reuse existing
      MarkSyncError; DEC-5 base-absent is NOT a state (engine handles create);
      DEC-6 both-missing edge -> LOCAL_MISSING. All 4 OQs RESOLVED at
      clarify_scope, no decision-advisor escalation needed.
    type: decision
    workItemRef: GH-22
    date: "2026-07-12"
  - text: >
      DoR iter-1 NOT_READY (1 blocker + 2 minor + 1 nit). Blocker: test-plan
      false-positive suite (TC-FALSEPOS-001/004, sharpen -002) asserted
      NO_CHANGE for diffs the verified GH-20 canonicalizer does NOT normalize
      (internal whitespace collapse, code-block trimming) — would have failed at
      delivery OR pressured coder to modify canonicalize.ts (breaching DEC-2).
      Why not caught earlier: spec/test-plan described the canonicalizer as
      "whitespace-invariant" in general terms without verifying the EXACT
      isStructuralWhitespace rule (drops only whitespace-only+newline nodes).
      Process improvement: reuse-claim verification against actual source
      (which @readiness-reviewer did) should happen at spec/test-plan
      authoring, not deferred to DoR — the spec-writer/test-plan-writer should
      read the cited module's implementation when a test asserts its behavior.
      Reopened test_planning + specification. PM applied spec fixes directly
      (finding 2 dep-cruiser rule-name typo; finding 3 folded plan PD-1 into
      spec DM-2/F-2 so ContentHash owns title+parentPageId) + pm-notes nit
      (finding 4); delegating test-plan false-positive rework to @test-plan-writer.
    type: retro
    workItemRef: GH-22
    date: "2026-07-12"
