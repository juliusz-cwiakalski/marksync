findings:
  - id: F-1
    severity: medium
    confidence: high
    category: correctness
    location: src/domain/state/classifier.ts:60
    message: >
      `local.title !== remote.title` is fragile because `remote.title` is
      OPTIONAL on `RemoteState.present` (DM-3 / sync-state.ts:38). When the
      engine (E3-S6) omits `remote.title`, any non-empty `local.title` makes
      `localChanged` true unconditionally, so the NO_CHANGE path
      (NFR-PERF-4 — "second unchanged push writes 0") is never reached and the
      classifier returns LOCAL_AHEAD -> Update on every push. This is a latent
      idempotency defect, not a silent-overwrite risk (it errs toward writing).
      No fixture exercises the absent-`remote.title` case — every mock sets
      `title: "Test Title"`. PD-3 attributes title to local-vs-remote but does
      not address the undefined case.
    suggestion: >
      Guard the title facet so an absent remote title is NOT treated as drift:
      `remote.title !== undefined && local.title !== remote.title`. Add a
      fixture (TC-STATE-001 variant) where `remote = { kind: "present",
      bodyHash, version }` (no title) still classifies as NO_CHANGE when local
      matches base on body/parent/attachments. Alternatively, document in the
      classifier that the engine MUST supply remote.title — but the guard is
      cheaper and keeps the idempotency invariant robust.
    suppressed: false
  - id: F-2
    severity: low
    confidence: high
    category: style
    location: src/domain/state/classifier.ts:3-6, src/domain/state/actions.ts:3-4, tests/unit/domain/state/classifier.test.ts:8-11, tests/unit/domain/state/actions.test.ts:8-10
    message: >
      Multiple import statements from the SAME module instead of one combined
      statement with inline `type` modifier. classifier.ts has two from
      `./hashes` and two from `./sync-state`; actions.ts has two from
      `./sync-state`; classifier.test.ts and actions.test.ts each have THREE
      from `#domain/state/sync-state`. This violates typescript.md "One import
      statement per module" and code-review-instructions.md "Import hygiene:
      one import statement per module — combine import type + import via inline
      type modifier". The sibling `reconcile.ts` does NOT exhibit this (its
      imports are one-per-module), so the new files diverge from the established
      pattern. Biome organizeImports does not catch it in check mode, so it is a
      reviewer-enforced rule.
    suggestion: >
      Combine each same-module pair/triple into one statement, e.g.
      `import { attachmentHash, type ContentHash } from "./hashes";` and
      `import { SyncStateSchema, SyncStateValue, type RemoteState, type SharedBase, type SyncState } from "./sync-state";`.
      Apply to all four locations.
    suppressed: false
