findings:
  - id: F-1
    severity: medium
    confidence: high
    category: correctness
    location: src/domain/state/classifier.ts:43
    message: >
      PRE-EXISTING (not introduced by the Phase 6 remediation). The title
      facet `local.title !== remote.title` is unguarded against an absent
      remote.title. RemoteState.present.title is optional (sync-state.ts:24);
      SharedBase carries no title, so title drift is necessarily detected
      local-vs-remote. If a remote ever omits title, any non-empty local.title
      forces localChanged → LOCAL_AHEAD → Update, defeating NFR-PERF-4
      idempotency. No fixture covers the absent-title case. Latent only:
      Confluence page fetches always return a title, and it errs toward
      writing (safe side), so it is non-blocking for the GH-22 DoD.
    suggestion: >
      Guard the facet: `remote.title !== undefined && local.title !==
      remote.title`, and add a NO_CHANGE fixture where remote = { kind:
      "present", bodyHash, version } carries no title. One-line fix; already
      captured in the pre-written Phase 7 (task 7.1) as optional fast-follow.
    suppressed: false
  - id: F-2
    severity: low
    confidence: high
    category: style
    location: src/domain/state/classifier.ts:3-6, src/domain/state/actions.ts:3-4, tests/unit/domain/state/classifier.test.ts:8-16, tests/unit/domain/state/actions.test.ts:7-9
    message: >
      PRE-EXISTING (not introduced by the remediation). Multiple import
      statements per module instead of one combined statement with inline
      `type` modifier (classifier.ts: two from ./hashes, two from ./sync-state;
      actions.ts: two from ./sync-state; the test files likewise). Diverges
      from the sibling reconcile.ts and the typescript.md "one import
      statement per module" guidance; Biome organizeImports does not enforce
      it in check mode.
    suggestion: >
      Combine each same-module pair into one statement, e.g.
      `import { attachmentHash, type ContentHash } from "./hashes";`. Already
      captured in the pre-written Phase 7 (task 7.2) as optional fast-follow.
    suppressed: false
