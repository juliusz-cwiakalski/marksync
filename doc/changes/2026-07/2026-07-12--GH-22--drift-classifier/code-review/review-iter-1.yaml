summary: >
  The classifier, hash delegation, Action mapping, and boundary purity are
  implemented correctly and the reused contracts (canonicalize/errors/result/
  page-binding) are untouched — INV-SAFE-1, INV-SAFE-2, DEC-1/2/3/5/6, the
  six-state enum, and the #domain-only purity all hold. However the change
  FAILS its DoD because AC-F2-1/NFR-4/NFR-8 (the false-positive guard) is not
  genuinely satisfied: TC-FALSEPOS-001..005 are byte-identical to TC-STATE-001
  and never run two superficially-different HASTs through canonicalHash(), so
  the canonical-comparison basis is unproven. A second high issue is the
  base-absent branch returning a misleading err(Forbidden) with an empty
  pageId, which violates DEC-3's reservation of Forbidden for the 403 path.
