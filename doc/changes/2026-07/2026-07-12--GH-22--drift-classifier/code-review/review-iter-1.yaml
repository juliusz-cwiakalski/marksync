  - id: F-7
    severity: info
    confidence: medium
    category: correctness
    location: src/domain/state/classifier.ts:62-65
    message: >
      remoteChanged only compares bodyHash and parentPageId — the remote side
      carries no attachment facet (RemoteState.present has no attachmentHashes),
      so remote-side attachment drift is structurally undetectable. This matches
      PD-3's explicit scoping (remoteChanged = body/parent only) and is a known
      MS-0002 limitation, not a defect — but it means a remote-only attachment
      loss would classify as NO_CHANGE/LOCAL_AHEAD rather than DIVERGED.
    suggestion: >
      No action required for GH-22 (this is a RemoteState/DM-3 design choice).
      Worth a one-line note in classifier.ts at the remoteChanged computation so
      a future reader knows attachments are local-vs-base only by design.
    suppressed: false
