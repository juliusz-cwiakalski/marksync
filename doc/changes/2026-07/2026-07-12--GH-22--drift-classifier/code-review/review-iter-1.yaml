findings:
  - id: F-1
    severity: critical
    confidence: high
    category: correctness
    location: tests/unit/domain/state/classifier.test.ts:158-214
    message: >
      The false-positive suite (TC-FALSEPOS-001..005) is hollow. All five tests
      construct identical fixtures — mockContentHash() (hardcoded canonicalHash:
      BASE_BODY_HASH) + mockSharedBase() + mockRemote() — i.e. byte-for-byte the
      same input as TC-STATE-001. They never call canonicalHash() on two
      superficially-different HASTs, so they assert NO_CHANGE by construction,
      not because GH-20 normalization ran. Plan task 2.2 explicitly required
      "five superficial diffs that the verified GH-20 canonicalizer provably
      normalizes to identical canonicalHash" and listed the four GH-20
      invariants (structural-ws-node drop, multi-ws-node collapse, attribute
      order, raw-vs-text, empty-line count). None are exercised. AC-F2-1 and
      NFR-4/NFR-8 (NFR-REL-3 mitigation) are not genuinely covered; if GH-20's
      canonicalizer regressed, these tests would still pass. The TC-REALCHG suite
      has the same weakness — it hardcodes differing hash constants rather than
      deriving them from genuine HAST edits through canonicalHash().
    suggestion: >
      For each false-positive case, build TWO structurally-different HAST inputs
      (e.g. base = {h1:[text:"A"]}, variant = {h1:[text:"A"], text:"\n"} where
      the extra node is newline structural whitespace) and assert
      canonicalHash(baseHast) === canonicalHash(variantHast) FIRST (proves GH-20
      normalizes), then feed them as local vs base/remote and assert
      ok(NO_CHANGE). Mirror for TC-REALCHG: build genuine content-edit HASTs and
      assert canonicalHash differs before asserting LOCAL_AHEAD. This makes the
      false-positive guard the thing under test, not the comparator.
    suppressed: false
  - id: F-2
    severity: high
    confidence: high
    category: correctness
    location: src/domain/state/classifier.ts:46-50
    message: >
      The base-absent branch returns err({ kind: "Forbidden"; pageId: "";
      operation: "read" }) for a contract-precondition violation (base
      undefined). DEC-3 reserves the Forbidden arm exclusively for the 403 path
      (Q1); reusing it here is semantically wrong and is a latent footgun: E3-S6
      would treat a programmer error as a 403 access condition (warn+skip,
      never delete/recreate) instead of surfacing a real bug. The empty pageId:
      "" placeholder is also a smell. This branch was not in the plan's classify
      pseudocode (task 2.1 step 4 assumes base present per DEC-5) and is
      untested.
    suggestion: >
      Make base required: change ClassifyInput.base from `base?: SharedBase` to
      `base: SharedBase` and delete the dead branch. DEC-5's contract is
      "classify is invoked only for bound documents (base present)", so the
      optional base is a lenient accommodation that creates this footgun for no
      benefit. If an impossible state must be defended, throw a typed invariant
      error — never reuse Forbidden for a non-403 condition.
    suppressed: false
