    location: src/domain/mermaid/normalize.ts:90
    message: >
      The data-mermaid-version stripping regex removes the attribute but leaves
      a dangling space inside the tag. For example, after attribute sorting a
      tag becomes `<svg data-mermaid-version="10.9.1" height="100" width="100">`;
      after stripping the attribute at line 90, it becomes
      `<svg  height="100" width="100">` (double space). Whitespace
      canonicalization (Rule 4) already ran, so the double space persists. This
      is still deterministic (same input always produces same double-space) so
      hash stability is not affected, but the output is not a clean canonical
      form.
    suggestion: >
      Move the data-mermaid-version stripping to BEFORE attribute sorting (Rule
      2), or add a final whitespace-in-tag cleanup pass after Rule 5. Low
      priority since determinism is preserved.
    suppressed: false
    published_url: null
