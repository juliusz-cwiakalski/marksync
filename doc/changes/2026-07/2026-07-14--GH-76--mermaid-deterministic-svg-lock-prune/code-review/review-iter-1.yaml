    published_thread_id: null
  - id: F-7
    severity: low
    confidence: medium
    category: correctness
    location: src/domain/mermaid/normalize.ts:21
    message: >
      The attribute-sorting regex skips attributes with empty values due to the
      `if (n && v)` guard (v = "" is falsy). For example, `class=""` would be
      silently dropped from the tag. The spike implementation did not have this
      filter. While Mermaid/Kroki SVGs are unlikely to emit empty-value
      attributes, this is a behavioral divergence from the proven GH-11 spike
      normalizer, and dropping an attribute is technically a structural
      difference (AC-F2-2).
    suggestion: >
      Use `if (n !== undefined && n !== null)` instead of truthiness check, or
      match the spike by removing the filter entirely (the regex guarantees both
      capture groups are non-empty via `[^"]+`... actually `[^"]*` allows empty,
      so keep a name check only: `if (n)`).
    suppressed: false
    published_url: null
    published_at: null
    published_comment_id: null
    published_thread_id: null
