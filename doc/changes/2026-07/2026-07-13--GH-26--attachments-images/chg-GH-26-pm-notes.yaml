# Doc-reconciliation items surfaced during clarify_scope; @spec-writer cites
# correctly, @doc-syncer reconciles system spec in phase 7.
doc_reconciliation:
  - id: DOC-1
    text: >
      Story file cross_cutting cites NFR-SEC-5 for path-traversal/path-safety,
      but NFR-SEC-5 in doc/spec/nonfunctional.md is "Converter injection safety"
      (macro injection), NOT path traversal. There is currently no explicit
      path-traversal NFR ID. Path safety is a clear, testable release-blocking
      security requirement (AC + R1/R2). Spec-writer should cite the requirement
      as stated (path-traversal confinement) and @doc-syncer may add a
      path-safety NFR row (e.g. NFR-SEC-7) or map to the INV-SEC/NFR-SEC-1 family
      in phase 7. Non-blocking.

clarify_scope_findings:
  dependencies_resolved:
    - "GH-21 (MS2-E3-S4 Confluence adapter) CLOSED/MERGED — AttachmentService (upload/exists/list) + 400-duplicate-filename→reuse + attachmentFilename() hash-naming already exist."
    - "GH-23 (MS2-E3-S6 Sync engine) CLOSED/MERGED — computePlan/applyPlan exist; attachmentHashes field plumbed through PageBinding/ContentHash."
  existing_infra_reused:
    - "src/infra/confluence/attachments.ts — AttachmentService.upload/exists/list + attachmentFilename() (marksync-asset-<hash>.<ext> / marksync-mermaid- for svg). /data update NOT exposed by design (hash-naming → changed bytes = new filename = fresh create)."
    - "TargetSystem port (src/domain/target/port.ts) — uploadAttachment/attachmentExists/listAttachments + Artifact{bytes,mime,hash}/AttachmentRef already defined."
    - "src/infra/confluence/render/storage.ts imageMacro() — ALREADY emits <ac:image><ri:url> for http(s) and <ri:attachment ri:filename> for local. BUT uses raw src filename, NOT hash-derived filename. Story must wire resolved hash filename into the pipeline."
  new_modules_needed:
    - "src/domain/assets/resolver.ts — AssetResolver (walk HAST image nodes, path-safe resolve relative to doc confined to root, reject ../ traversal → Forbidden{operation:'path-traversal'}, realpath symlink resolution per R1, sha256 content-hash identity)."
    - "src/domain/assets/naming.ts — domain-side filename scheme (mirrors infra attachmentFilename; reconcile first24(sha256) per story vs full hash in infra)."
  integration_points:
    - "computePlan: currently builds contentHash with attachmentHashes:{} (empty). Must run AssetResolver per doc → populate attachmentHashes + resolve hash filenames into the rendered body (so ri:attachment carries the dedup key)."
    - "applyPlan / Create path: must upload attachments (target.uploadAttachment) after page create/update; reuse if attachmentExists(hash) true → 0 writes. attachmentHashes must persist into PageBinding."
    - "imageMacro: use resolved hash filename for local images (currently uses src basename). Remote (http/https) already correct → ri:url."
  pre_resolved_by_story:
    - "R1 (symlinks escaping root) — CEO-resolved: realpath before confinement check, reject if target escapes root."
    - "Q1 (large assets) — CEO-resolved: no hard cap for MS-0002 (Confluence enforces own limit); warn on >25MB. AttachmentService already maps 413→TooLarge."

