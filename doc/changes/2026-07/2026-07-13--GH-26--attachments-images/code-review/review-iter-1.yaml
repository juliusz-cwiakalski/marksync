    published_comment_id: null
    published_thread_id: null
  - id: F-5
    severity: high
    confidence: medium
    category: correctness
    location: src/domain/assets/resolver.ts:214
    message: >
      `sha256Hex` calls `crypto.subtle.digest("SHA-256", bytes.buffer as
      ArrayBuffer)`. When `bytes` is a subarray view (non-zero byteOffset or
      byteLength shorter than the backing ArrayBuffer), `bytes.buffer` is the
      FULL backing slab, so the digest is computed over the wrong byte range.
      The default `readBytes` implementation explicitly returns such a view
      (`new Uint8Array(buffer.buffer, buffer.byteOffset, buffer.byteLength)`),
      and Node `Buffer`s from `readFileSync` can be pool-allocated with non-zero
      byteOffset. A wrong hash means a wrong dedup filename → silent re-uploads
      and, worse, `attachmentExists(hash)` misses → idempotency leaks and
      potential cross-content key confusion.
    suggestion: >
      Pass the typed-array view directly: `crypto.subtle.digest("SHA-256",
      bytes)` (BufferSource accepts ArrayBufferView and honours
      byteOffset/byteLength). Add a unit test that hashes a subarray view
      (`someBigBuffer.subarray(4, 8)`) and asserts it equals the hash of just
      those 4 bytes.
    suppressed: false
    published_url: null
    published_at: null
    published_comment_id: null
    published_thread_id: null
