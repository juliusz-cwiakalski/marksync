  - id: F-9
    severity: medium
    confidence: medium
    category: correctness
    location: src/domain/assets/resolver.ts:94
    message: >
      In-doc dedup keys on the canonical path but the rewrite lookup is
      `srcMap.get(src)` keyed by the ORIGINAL src string. When two distinct src
      strings resolve to the same file (e.g. `image.png` and `./image.png`, or
      `img/x.png` vs an absolute-equivalent), the second node hits the
      visitedPaths branch, `srcMap.get(<second src>)` returns undefined, and the
      node is left with its original src — so `imageMacro` emits a
      `<ri:attachment>` for the raw basename and the image is broken. The
      spec (F-1) requires "rewrite both nodes to the same filename".
    suggestion: >
      Key the rewrite lookup by canonical path (maintain a
      `Map<canonicalPath, ResolvedAsset>` in addition to or instead of the
      src-keyed srcMap), so any src resolving to an already-processed canonical
      path gets the correct filename regardless of the original src spelling.
    suppressed: false
    published_url: null
    published_at: null
    published_comment_id: null
    published_thread_id: null
