  - id: F-4
    severity: high
    confidence: high
    category: security
    location: tests/unit/domain/assets/resolver.test.ts:121
    message: >
      TC-UNIT-003 (URL-encoded `%2e%2e%2f` traversal) is a FALSE POSITIVE. The
      comment claims "path.resolve will decode this as ../", but `path.resolve`
      does NOT URL-decode — `%2e%2e%2f` is treated as a literal filename, so the
      resolved path stays inside root. The test only passes because that literal
      filename does not exist (realpath throws → Forbidden). A resolver that
      silently allowed traversal via un-decoded paths would still pass this
      case, and the genuinely dangerous vector (a `src` that decodes to `../`
      somewhere upstream) is not covered.
    suggestion: >
      Either (a) drop the URL-encoding claim and replace with a real decoded-
      traversal fixture, or (b) if encoded srcs can reach the resolver from the
      markdown pipeline, add a decode step in the resolver and test a path that
      genuinely resolves outside root after decoding. At minimum make the target
      file exist so the prefix check — not a realpath miss — is what rejects it.
    suppressed: false
