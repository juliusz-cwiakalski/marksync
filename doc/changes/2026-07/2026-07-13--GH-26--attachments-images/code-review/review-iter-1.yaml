findings:
  - id: F-1
    severity: critical
    confidence: high
    category: correctness
    location: src/domain/assets/naming.ts:14
    message: >
      User-authored SVG images are broken end-to-end. The domain
      `assetFilename()` rewrites the HAST node to
      `marksync-asset-<hash>.svg`, but the infra `AttachmentService.upload`
      (attachments.ts:142) uploads the SAME artifact as
      `marksync-mermaid-<hash>.svg`. Confluence therefore stores the attachment
      under the mermaid name while the rendered body's `<ri:attachment>` points
      at the asset name — the image cannot resolve. The mismatch also poisons
      idempotency: `computePlan` keys `ContentHash.attachmentHashes` by the
      domain filename, while `applyPlan`→`uploadAssets` keys
      `PageBinding.attachmentHashes` by the server-returned (mermaid) filename,
      so every reclassify sees `attachmentHash` differ → SVG docs always classify
      LOCAL_AHEAD and re-upload. AC-4 (svg renders the correct ri:attachment) is
      not met. The naming test even asserts the divergence and labels it
      "documented", but the documentation missed the functional impact.
    suggestion: >
      Make the two naming authorities agree for SVG. Preferred: change the infra
      `attachmentFilename` to use `marksync-asset-` for ALL non-mermaid SVGs
      (gate the `marksync-mermaid-` prefix on an explicit `kind: "mermaid"`
      artifact marker, not on mime alone), OR have the resolver pass the filename
      it wrote into the HAST through to the upload so the server name matches the
      HAST name. Then add an integration assertion that the uploaded filename
      equals the HAST ri:attachment filename for svg.
    suppressed: false
