summary: >
  The AssetResolver confinement core is sound (realpath + root/path.sep prefix,
  0-bytes-read on escape, single-authority full-sha256 naming for non-SVG) and
  dep-cruiser/error-model/domain-purity constraints are honoured, but the change
  carries one release-blocking correctness bug and several test-validity gaps
  that undermine the security AC it claims to satisfy. CRITICAL: user-authored
  SVG images are broken on Confluence — the domain rewrites the HAST to
  `marksync-asset-<hash>.svg` while the infra AttachmentService uploads the same
  artifact as `marksync-mermaid-<hash>.svg`, so the `<ri:attachment>` references
  a filename that was never uploaded; the same mismatch also breaks idempotency
  for SVG-bearing docs. Two of the six path-traversal test cases (TC-UNIT-003
  URL-encoded, TC-UNIT-005 root-prefix) are FALSE POSITIVES — they pass because
  the target path does not exist (realpath throws) rather than exercising the
  confinement logic they claim to prove. The `applyPlan` upload wiring
  (`uploadAssets` + Create/Update/reapply paths) has NO coverage through the real
  code; TC-INTEGRATION-001/002 reimplement the helper inline, and the required
  TC-UNIT-009 (asset drift) and TC-INTEGRATION-006 (large-asset/isolation) tests
  are missing despite their plan tasks being marked [x].
