  `bun run check` is green (993 pass / 0 fail / 0 dep violations), errors.ts has
  a zero-line diff vs main, and `src/domain/assets/` stays infra/app-pure. Four
  NON-BLOCKING findings remain (1 medium / 2 low / 1 info); none are
