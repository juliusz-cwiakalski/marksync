summary: >
  All 11 iter-1 findings are genuinely resolved in the current code, including
  every release-blocking item. F-1 (critical SVG naming divergence) is fixed:
  `attachmentFilename` now gates the `marksync-mermaid-` prefix on an explicit
  `kind === "mermaid"` marker (not mime), the `Artifact.kind?` field exists, and
  TC-UNIT-010 proves domain `assetFilename` === infra `attachmentFilename` for
