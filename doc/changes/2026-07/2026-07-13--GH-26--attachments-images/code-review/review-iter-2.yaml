findings:
  - id: F-1
    severity: medium
    confidence: high
    category: observability
    location: src/cli/commands/sync.ts:87
    message: >
      Residual F-8: the >25 MB warning is collected into `ApplyReport.warnings`
      (populated end-to-end from `uploadAssets` → `processEntry` → `applyPlan`),
      but `syncCommand` wraps the report via `ok(applyResult.value)` WITHOUT
      passing `meta.warnings`, so the top-level `CommandResult.warnings` stays
      undefined. The generic human renderer only renders the dedicated
      `warning:` lines from `result.warnings` (top-level); the asset warning
      therefore appears buried inside the compact `data:` JSON blob rather than
      as a readable warning line. The warning IS present in structured/JSON
      output (as `data.warnings`) and the hash does NOT leak, so the core F-8
      harms (console.warn to stderr, hash leak, invisibility to the structured
      path) are all addressed — this is a rendering-prominence gap, not a
      security/correctness regression.
    suggestion: >
      In `syncCommand`, map `applyResult.value.warnings` into the `ok()` meta
      (e.g. `ok(report, { warnings: report.warnings.map(message => ({ code:
      "ASSET_SIZE", message })) })`) so the human renderer surfaces them via its
      dedicated warning channel. Non-blocking; can ship as-is and address in a
      follow-up.
    suppressed: false
    published_url: null
    published_at: null
    published_comment_id: null
    published_thread_id: null
  - id: F-2
    severity: low
    confidence: high
    category: testing
    location: tests/unit/domain/assets/resolver.test.ts:49
    message: >
      The replacement TC-UNIT-003 (relative `../../` traversal) uses two separate
      `Date.now()` calls for the outside directory — `outsideDir` is built at
      line 28 (timestamp T1) while the img `src` embeds a fresh `Date.now()` at
      line 49 (timestamp T2). Empirically confirmed: T1 ≠ T2, so the file
      referenced by the resolved src does NOT exist and `realpath` throws,
      meaning the test passes via a realpath-miss rather than the
      `rootReal + path.sep` prefix check. This is the same false-positive class
      iter-1 flagged (now a different root cause: timestamp mismatch instead of
      URL-encoding). It is NOT release-blocking because the prefix check is
      genuinely exercised by TC-UNIT-005 (root-prefix, real file), TC-UNIT-006
      (symlink → /etc/passwd, real target), and TC-UNIT-003-abs (absolute, real
      file) — the confinement invariant is sound and proven.
    suggestion: >
      Capture a single timestamp into a variable at the top of the test and
      reuse it for both `outsideDir` and the img `src` (or reference
      `outsideFile` directly as the absolute variant already does), so realpath
      succeeds and the prefix check is the actual rejection path.
    suppressed: false
    published_url: null
    published_at: null
    published_comment_id: null
    published_thread_id: null
  - id: F-3
    severity: low
    confidence: high
    category: style
    location: src/domain/assets/resolver.ts:179
    message: >
      The F-5 fix in `sha256Hex` carries two minor style nits. (a) It uses
      `bytes as any` to satisfy the `BufferSource` parameter type — functional
      and honours the view, but bypasses type safety (a typed lib.dom config or
      an explicit `Uint8Array` → `ArrayBufferView` annotation would be cleaner).
      (b) The inline comment `// F-5: Pass the Uint8Array view (not bytes.buffer)
      ...` references a transient review-finding ID; AGENTS.md asks not to
      scatter review/ticket tag noise in code. The WHY is worth keeping; the ID
      is not.
    suggestion: >
      Drop the `as any` cast in favour of a typed expression (or a one-line
      `// BufferSource accepts ArrayBufferView` note if the lib types need it)
      and reword the comment to state the invariant without the finding ID.
    suppressed: false
    published_url: null
    published_at: null
    published_comment_id: null
    published_thread_id: null
