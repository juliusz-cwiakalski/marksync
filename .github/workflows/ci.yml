# MarkSync CI — fast loop (lint + typecheck + test on every push/PR)
#
# Runs on: Node 22 (Bun installed via setup-bun). E2E/lite-sandbox tests are
# gated separately (run-e2e.yml) to keep the fast loop stable.
#
# Implements: TDR-0004 (bun:test primary runner), FSE-audit Attribute 5/6,
# NFR-SEC-4 (dependency audit).
#
# Status: Phase 4 baseline. Scripts (lint, typecheck, test) assume the
# package.json that will be created at MS-0002 implementation start. Until
# then, CI will pass trivially (no source to lint/test).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-loop:
    name: Lint + Typecheck + Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # MS-0002 target: Linux + Windows. macOS deferred to MS-0003.
        # Windows added at MS-0002 implementation start.
        bun-version: ["1.2"]  # pin to a concrete patch at MS-0002 start (snapshot stability)

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile
        continue-on-error: true # no package.json yet during inception

      - name: Lint
        run: bun run lint
        continue-on-error: true # no linter configured yet during inception

      - name: Typecheck
        run: bun run typecheck
        continue-on-error: true # no tsconfig.json yet during inception

      - name: Test (unit + integration + golden — exclude E2E and BDD)
        run: bun test tests/unit/ tests/integration/ tests/golden/ || true
        # During inception there are no tests; `|| true` keeps CI green.
        # Exclude E2E (live-sandbox) and BDD (cucumber CLI) from the bun:test fast loop.
        # BDD tests run via `bun run test:bdd` (cucumber CLI per TDR-0007).
        # At MS-0002 start, remove `|| true`.

      - name: BDD lifecycle invariants (cucumber)
        run: bun run test:bdd || true
        # Runs @cucumber/cucumber for INV-SAFE-1/2/3 + INV-SEC-1 (TDR-0007).
        # During inception there are no .feature files; `|| true` keeps CI green.
        # At MS-0002 start, remove `|| true`.

  dependency-audit:
    name: Dependency + License Audit
    runs-on: ubuntu-latest
    # Runs on every push/PR; the actual scan is gated per-step after checkout
    # (job-level hashFiles evaluates before checkout, so it always sees no files).
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Check for lockfile
        id: lockfile
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            if [ -f bun.lock ]; then echo "name=bun.lock" >> "$GITHUB_OUTPUT"
            else echo "name=bun.lockb" >> "$GITHUB_OUTPUT"; fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No lockfile found — skipping dependency audit (expected during inception)"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile
        if: steps.lockfile.outputs.exists == 'true'

      - name: Vulnerability scan (osv-scanner)
        if: steps.lockfile.outputs.exists == 'true'
        run: |
          # osv-scanner scans the lockfile for known vulnerabilities (NFR-SEC-4)
          # NOTE: verify --lockfile vs --lockfile flag at MS-0002 start (osv-scanner may use -L/--lockfile)
          npx @google/osv-scanner --lock-file "${{ steps.lockfile.outputs.name }}" || true
        continue-on-error: true # advisory during inception; make blocking at MS-0002

      - name: License audit
        if: steps.lockfile.outputs.exists == 'true'
        run: |
          # Reject GPL/AGPL/LGPL/UNLICENSED dependencies (MarkSync is MIT)
          npx license-checker --production --failOn "GPL;AGPL;LGPL;UNLICENSED" || true
        continue-on-error: true # advisory during inception; make blocking at MS-0002

  doc-yaml-lint:
    name: YAML + Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          # Validate all YAML files in the repo parse correctly (doc + workflows)
          python3 -c "
          import yaml, sys, glob
          files = (
            glob.glob('doc/**/*.yaml', recursive=True) +
            glob.glob('doc/**/*.yml', recursive=True) +
            glob.glob('.github/workflows/*.yml') +
            glob.glob('.github/workflows/*.yaml')
          )
          errors = []
          for f in files:
            try:
              yaml.safe_load(open(f))
            except Exception as e:
              errors.append(f'{f} — {e}')
          if errors:
            for e in errors:
              print(f'FAIL: {e}', file=sys.stderr)
            sys.exit(1)
          print(f'OK: {len(files)} YAML files validated')
          "

      - name: Check Markdown links
        run: |
          # Check that every relative .md link in project-authored docs resolves.
          # Excludes ADOS-installed templates/guides (pre-existing broken refs)
          # and doc/inception/tmp/ (vendored repos).
          python3 -c "
          import re, os, sys, glob
          link_re = re.compile(r'\[([^\]]+)\]\(([^)]+)\)')
          # Project-authored paths only
          scan_globs = [
            'doc/overview/**/*.md',
            'doc/decisions/**/*.md',
            'doc/spec/**/*.md',
            'doc/inception/open-questions/**/*.md',
            'doc/inception/retrospective/**/*.md',
            'doc/inception/README.md',
            'doc/guides/dev-environment.md',
            'doc/guides/security-baseline.md',
            'doc/guides/accessibility-baseline.md',
            '.ai/**/*.md',
          ]
          errors = []
          for pattern in scan_globs:
            for md_file in glob.glob(pattern, recursive=True):
              if 'doc/inception/tmp/' in md_file:
                continue
              dir_of = os.path.dirname(md_file)
              with open(md_file, encoding='utf-8') as f:
                for line_no, line in enumerate(f, 1):
                  for match in link_re.finditer(line):
                    target = match.group(2).split()[0].split('#')[0]
                    if target.startswith('http') or target.startswith('mailto'):
                      continue
                    if not target.endswith('.md'):
                      continue
                    resolved = os.path.normpath(os.path.join(dir_of, target))
                    if not os.path.exists(resolved):
                      errors.append(f'{md_file}:{line_no} — broken link: {target} (resolved: {resolved})')
          if errors:
            for e in errors[:50]:
              print(f'BROKEN: {e}', file=sys.stderr)
            if len(errors) > 50:
              print(f'... and {len(errors) - 50} more', file=sys.stderr)
            sys.exit(1)
          print('OK: all relative Markdown links resolve')
          "
