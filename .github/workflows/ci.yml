# MarkSync CI — fast loop (lint + typecheck + test on every push/PR)
#
# Runs on: Ubuntu (Bun installed via setup-bun). E2E/lite-sandbox tests are
# gated separately (run-e2e.yml) to keep the fast loop stable.
#
# Implements: TDR-0004 (bun:test primary runner), FSE-audit Attribute 5/6,
# NFR-SEC-4 (dependency audit), TDR-0008 C-2 (CI commit-lint, AC-F4-3).
#
# OPEN-Q9 (closed): every inception-era `continue-on-error: true` and `|| true`
# advisory guard has been removed — lint/typecheck/test/boundary/audit signals
# are now BINDING. Bun is pinned to a concrete patch (NFR-6 / DEC-6).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-loop:
    name: Lint + Typecheck + Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # MS-0002 target: Linux + Windows. macOS deferred to MS-0003.
        # Windows added at MS-0002 implementation start.
        # Pinned to a concrete patch for snapshot stability (NFR-6 / DEC-6);
        # must match package.json#engines.bun.
        bun-version: ["1.2.23"]

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `commitlint --from origin/main` resolves (AC-F4-3).
          # The default fetch-depth: 1 (shallow) makes origin/main ambiguous.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint commit messages
        # CI authoritative Conventional Commits gate (TDR-0008 C-2 / AC-F4-3).
        # Defense-in-depth with the local husky commit-msg hook: this catches
        # `--no-verify` commits the local hook skips. Runs directly (no 3rd-party
        # Action) so @commitlint/cli from devDeps is the only thing needed.
        run: bunx commitlint --from origin/main --to HEAD

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test (unit + integration + golden — exclude E2E and BDD)
        # Exclude E2E (live-sandbox, run-e2e.yml) and BDD (cucumber CLI) from
        # the bun:test fast loop. BDD runs via `bun run test:bdd` below.
        run: bun test tests/unit/ tests/integration/ tests/golden/

      - name: Check import boundaries (dependency-cruiser)
        # Ports-and-adapters tier enforcement (TDR-0006 / AC-F3-1).
        run: bun run check:boundaries

      - name: BDD lifecycle invariants (cucumber)
        # Runs @cucumber/cucumber for INV-SAFE-1/2/3 + INV-SEC-1 (TDR-0007).
        # The test:bdd script no-ops until the BDD runner wires in E5-S1
        # (MS2-E5), so this step is green now and binding once features land.
        run: bun run test:bdd

  dependency-audit:
    name: Dependency + License Audit
    runs-on: ubuntu-latest
    # Bun version floats here (NFR-6 narrowed: only the fast-loop matrix is
    # pinned; the audit just needs a working Bun to install for license-checker).
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Check for lockfile
        id: lockfile
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            if [ -f bun.lock ]; then echo "name=bun.lock" >> "$GITHUB_OUTPUT"
            else echo "name=bun.lockb" >> "$GITHUB_OUTPUT"; fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No lockfile found — skipping dependency audit (expected during inception)"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile
        if: steps.lockfile.outputs.exists == 'true'

      - name: Vulnerability scan (osv-scanner)
        # Scans the lockfile for known vulnerabilities (NFR-SEC-4). BLOCKING.
        # OQ-2 resolved: osv-scanner V2 uses the `scan` subcommand + `-L`
        # (the hyphenated `--lock-file` was not a valid V2 flag; V1 used
        # `--lockfile`/`-L`). `scan source` is the default sub-subcommand.
        if: steps.lockfile.outputs.exists == 'true'
        run: |
          npx @google/osv-scanner scan -L "${{ steps.lockfile.outputs.name }}"

      - name: License audit
        # Reject GPL/AGPL/LGPL/UNLICENSED dependencies (MarkSync is MIT). BLOCKING.
        if: steps.lockfile.outputs.exists == 'true'
        run: |
          npx license-checker --production --failOn "GPL;AGPL;LGPL;UNLICENSED"

  doc-yaml-lint:
    name: YAML + Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          # Validate all YAML files in the repo parse correctly (doc + workflows)
          python3 -c "
          import yaml, sys, glob
          files = (
            glob.glob('doc/**/*.yaml', recursive=True) +
            glob.glob('doc/**/*.yml', recursive=True) +
            glob.glob('.github/workflows/*.yml') +
            glob.glob('.github/workflows/*.yaml')
          )
          errors = []
          for f in files:
            try:
              yaml.safe_load(open(f))
            except Exception as e:
              errors.append(f'{f} — {e}')
          if errors:
            for e in errors:
              print(f'FAIL: {e}', file=sys.stderr)
            sys.exit(1)
          print(f'OK: {len(files)} YAML files validated')
          "

      - name: Check Markdown links
        run: |
          # Check that every relative .md link in project-authored docs resolves.
          # Excludes ADOS-installed templates/guides (pre-existing broken refs)
          # and doc/inception/tmp/ (vendored repos).
          python3 -c "
          import re, os, sys, glob
          link_re = re.compile(r'\[([^\]]+)\]\(([^)]+)\)')
          # Project-authored paths only
          scan_globs = [
            'doc/overview/**/*.md',
            'doc/decisions/**/*.md',
            'doc/spec/**/*.md',
            'doc/inception/open-questions/**/*.md',
            'doc/inception/retrospective/**/*.md',
            'doc/inception/readiness-report.md',
            'doc/inception/README.md',
            'doc/guides/dev-environment.md',
            'doc/guides/security-baseline.md',
            'doc/guides/accessibility-baseline.md',
            'doc/00-index.md',
            'doc/documentation-profile.md',
            'doc/documentation-handbook.md',
            '.ai/**/*.md',
            'AGENTS.md',
            'README.md',
          ]
          errors = []
          for pattern in scan_globs:
            for md_file in glob.glob(pattern, recursive=True):
              if 'doc/inception/tmp/' in md_file:
                continue
              dir_of = os.path.dirname(md_file)
              with open(md_file, encoding='utf-8') as f:
                for line_no, line in enumerate(f, 1):
                  for match in link_re.finditer(line):
                    target = match.group(2).split()[0].split('#')[0]
                    if target.startswith('http') or target.startswith('mailto'):
                      continue
                    if not target.endswith('.md'):
                      continue
                    resolved = os.path.normpath(os.path.join(dir_of, target))
                    if not os.path.exists(resolved):
                      errors.append(f'{md_file}:{line_no} — broken link: {target} (resolved: {resolved})')
          if errors:
            for e in errors[:50]:
              print(f'BROKEN: {e}', file=sys.stderr)
            if len(errors) > 50:
              print(f'... and {len(errors) - 50} more', file=sys.stderr)
            sys.exit(1)
          print('OK: all relative Markdown links resolve')
          "
