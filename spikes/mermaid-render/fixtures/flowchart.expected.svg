<style>#flowchart{font-family:NORM;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#flowchart .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#flowchart .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#flowchart .error-icon{fill:#552222;}#flowchart .error-text{fill:#552222;stroke:#552222;}#flowchart .edge-thickness-normal{stroke-width:1px;}#flowchart .edge-thickness-thick{stroke-width:3.5px;}#flowchart .edge-pattern-solid{stroke-dasharray:0;}#flowchart .edge-thickness-invisible{stroke-width:0;fill:none;}#flowchart .edge-pattern-dashed{stroke-dasharray:3;}#flowchart .edge-pattern-dotted{stroke-dasharray:2;}#flowchart .marker{fill:#333333;stroke:#333333;}#flowchart .marker.cross{stroke:#333333;}#flowchart svg{font-family:NORM;font-size:16px;}#flowchart p{margin:0;}#flowchart .label{font-family:NORM;color:#333;}#flowchart .cluster-label text{fill:#333;}#flowchart .cluster-label span{color:#333;}#flowchart .cluster-label span p{background-color:transparent;}#flowchart .label text,#flowchart span{fill:#333;color:#333;}#flowchart .node rect,#flowchart .node circle,#flowchart .node ellipse,#flowchart .node polygon,#flowchart .node path{fill:#ECECFF;stroke:#9370DB;stroke-width:1px;}#flowchart .rough-node .label text,#flowchart .node .label text,#flowchart .image-shape .label,#flowchart .icon-shape .label{text-anchor:middle;}#flowchart .node .katex path{fill:#000;stroke:#000;stroke-width:1px;}#flowchart .rough-node .label,#flowchart .node .label,#flowchart .image-shape .label,#flowchart .icon-shape .label{text-align:center;}#flowchart .node.clickable{cursor:pointer;}#flowchart .root .anchor path{fill:#333333!important;stroke-width:0;stroke:#333333;}#flowchart .arrowheadPath{fill:#333333;}#flowchart .edgePath .path{stroke:#333333;stroke